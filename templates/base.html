<!DOCTYPE html>
<html>
<head>
  <title>{% block title %}My App{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div class="app">

  <!-- MENU (VISIBLE EVERYWHERE) -->
  <div class="sidebar">
    <h1>Trading Futures</h1>

    <label style="display:block; margin-bottom:8px;">
      Account
      <select id="accountSelect" style="width:100%; margin-top:4px;">
        <option value="">Select account…</option>
      </select>
    </label>
    
    <a class="menu-item" href="{{ url_for('dashboard') }}">
      📊 Dashboard
    </a>

    <a class="menu-item" href="{{ url_for('journal') }}">
      📔 Journal
    </a>

      <a class="menu-item" href="{{ url_for('charts') }}">
      📔 Charts
    </a>

    <a class="menu-item" href="{{ url_for('upload_file') }}">
      ➕ New trades
    </a>

    <a class="menu-item" href="{{ url_for('settings') }}">
      ➕ Settings
    </a>

  </div>

  <!-- PAGE CONTENT -->
  <div class="main">
    {% block content %}{% endblock %}
  </div>

</div>
</body>
</html>
