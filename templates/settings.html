{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}

<h2>Settings</h2>

<div class="settings-container">

  <!-- ROW 1 -->
  <div class="tile">
    <h3>Profile</h3>
    <table class="settings-table">
      <tbody>
        <tr>
          <td>Timezone</td>
          <td>
            <select id="timezoneSelect" class="dark-select" style="width:100%"></select>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

    <div class="tile">
    <h3>Trading Accounts</h3>
    <table class="settings-table">
      <tbody id="accountsBody"></tbody>
    </table>
    <div class="account-add-row" onclick="addAccountRow()">
      + Add trading account
    </div>
  </div>

  <div class="tile">
    <h3>Fees</h3>
    <table class="settings-table">
      <thead>
        <tr>
          <th>Symbol</th>
          <th>Fees (round turn)</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="feesBody"></tbody>
    </table>
    <div class="account-add-row" onclick="addFeeRow()">
      + Add fee
    </div>
  </div>

  <div class="settings-empty-area">
    <!-- reserved for future use -->
  </div>

  <!-- second row -->

  <div class="tile">
    <h3>Strategies</h3>
    <div id="strategiesList" class="tag-list"></div>
    <div class="tag-add-row">
      <input id="newStrategyName" placeholder="New strategy...">
      <input type="color" id="newStrategyColor" value="#5b8ef5">
      <button onclick="addStrategy()">Add</button>
    </div>
  </div>

  <div class="tile">
    <h3>Setups</h3>
    <div id="setupsList" class="tag-list"></div>
    <div class="tag-add-row">
      <input id="newSetupName" placeholder="New setup...">
      <input type="color" id="newSetupColor" value="#34c38f">
      <button onclick="addSetup()">Add</button>
    </div>
  </div>

  <div class="tile">
    <h3>Emotions</h3>
    <div id="emotionsList" class="tag-list"></div>
    <div class="tag-add-row">
      <input id="newEmotionName" placeholder="New emotion...">
      <input type="color" id="newEmotionColor" value="#e8a94a">
      <button onclick="addEmotion()">Add</button>
    </div>
  </div>
</div>

<script>
/* ================= ACCOUNTS ================= */

function loadAccounts() {
  fetch("/api/accounts")
    .then(r => r.json())
    .then(data => {
      const tbody = document.getElementById("accountsBody");
      tbody.innerHTML = "";
      data.forEach(acc => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><input value="${acc.name || ""}" onchange="updateAccount('${acc.id}','name',this.value)"></td>
          <td><button class="btn-danger" onclick="deleteAccount('${acc.id}')">Delete</button></td>
        `;
        tbody.appendChild(tr);
      });
    });
}

function addAccountRow() {
  const tbody = document.getElementById("accountsBody");
  const tr = document.createElement("tr");
  tr.innerHTML = `<td><input placeholder="Account name"></td><td></td>`;
  tbody.appendChild(tr);

  const input = tr.querySelector("input");
  input.focus();
  let saved = false;

  function cleanup() { if (!input.value.trim()) tr.remove(); }
  function save() {
    if (saved) return;
    const name = input.value.trim();
    if (!name) return cleanup();
    saved = true;
    fetch("/api/accounts", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ name })
    }).then(loadAccounts);
  }

  input.addEventListener("keydown", e => {
    if (e.key === "Enter") save();
    if (e.key === "Escape") cleanup();
  });
  input.addEventListener("blur", save);
}

function updateAccount(id, field, value) {
  fetch(`/api/accounts/${id}`, {
    method: "PATCH",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ [field]: value })
  });
}

function deleteAccount(id) {
  if (!confirm("Delete this account?")) return;
  fetch(`/api/accounts/${id}`, { method: "DELETE" }).then(loadAccounts);
}


/* ================= FEES ================= */

function loadFees() {
  fetch("/api/fees")
    .then(r => r.json())
    .then(data => {
      const tbody = document.getElementById("feesBody");
      tbody.innerHTML = "";

      data.forEach(fee => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>
            <input value="${fee.symbol || ""}" 
              onchange="updateFee('${fee.id}','symbol',this.value)">
          </td>
          <td>
            <input value="${fee.fees || ""}" 
              onchange="updateFee('${fee.id}','fees',this.value)">
          </td>
          <td>
            <button class="btn-danger" onclick="deleteFee('${fee.id}')">Delete</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    });
}


function addFeeRow() {
  const tbody = document.getElementById("feesBody");
  const tr = document.createElement("tr");

  tr.innerHTML = `
    <td><input placeholder="Symbol (e.g. ES)"></td>
    <td><input type="number" step="0.01" placeholder="Fee (e.g. 2.5)"></td>
    <td></td>
  `;

  tbody.appendChild(tr);

  const inputs = tr.querySelectorAll("input");
  const symbolInput = inputs[0];
  const feeInput = inputs[1];

  symbolInput.focus();
  let saved = false;

  function cleanup() {
    if (!symbolInput.value.trim()) tr.remove();
  }

  function save() {
    if (saved) return;

    const symbol = symbolInput.value.trim();
    const fees   = feeInput.value.trim();

    if (!symbol) return cleanup();

    saved = true;

    fetch("/api/fees", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ symbol, fees })
    }).then(loadFees);
  }

  [symbolInput, feeInput].forEach(input => {
    input.addEventListener("keydown", e => {
      if (e.key === "Enter") save();
      if (e.key === "Escape") cleanup();
    });
    input.addEventListener("blur", save);
  });
}


function updateFee(id, field, value) {
  fetch(`/api/fees/${id}`, {
    method: "PATCH",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ [field]: value })
  });
}


function deleteFee(id) {
  if (!confirm("Delete this fee?")) return;
  fetch(`/api/fees/${id}`, { method: "DELETE" })
    .then(loadFees);
}
/* ================= STRATEGIES ================= */

async function loadStrategies() {
  const data = await fetch("/api/strategies").then(r => r.json());
  const container = document.getElementById("strategiesList");
  container.innerHTML = "";
  data.forEach(s => {
    const el = document.createElement("div");
    el.className = "tag-edit-row";
    el.innerHTML = `
      <span class="strategy-tag" style="background:${s.color}">
        <input value="${s.strategy_name}" onchange="updateStrategy(${s.id}, this.value)">
        <span class="tag-remove" onclick="deleteStrategy(${s.id})">×</span>
      </span>
      <input type="color" value="${s.color}" onchange="updateStrategyColor(${s.id}, this.value)">
    `;
    container.appendChild(el);
  });
}

function addStrategy() {
  const name = document.getElementById("newStrategyName").value;
  const color = document.getElementById("newStrategyColor").value;
  if (!name.trim()) return;
  fetch("/api/strategies", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ strategy_name: name, color })
  }).then(() => {
    document.getElementById("newStrategyName").value = "";
    loadStrategies();
  });
}

function updateStrategy(id, name) {
  fetch(`/api/strategies/${id}`, {
    method: "PATCH",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ strategy_name: name })
  });
}

function updateStrategyColor(id, color) {
  fetch(`/api/strategies/${id}`, {
    method: "PATCH",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ color })
  }).then(loadStrategies);
}

function deleteStrategy(id) {
  if (!confirm("Delete this strategy?")) return;
  fetch(`/api/strategies/${id}`, { method: "DELETE" }).then(loadStrategies);
}

/* ================= SETUPS ================= */

async function loadSetups() {
  const data = await fetch("/api/setups").then(r => r.json());
  const container = document.getElementById("setupsList");
  container.innerHTML = "";
  data.forEach(s => {
    const el = document.createElement("div");
    el.className = "tag-edit-row";
    el.innerHTML = `
      <span class="setup-tag" style="background:${s.color}">
        <input value="${s.setup_name}" onchange="updateSetup(${s.id}, this.value)">
        <span class="tag-remove" onclick="deleteSetup(${s.id})">×</span>
      </span>
      <input type="color" value="${s.color}" onchange="updateSetupColor(${s.id}, this.value)">
    `;
    container.appendChild(el);
  });
}

function addSetup() {
  const name = document.getElementById("newSetupName").value;
  const color = document.getElementById("newSetupColor").value;
  if (!name.trim()) return;
  fetch("/api/setups", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ setup_name: name, color })
  }).then(() => {
    document.getElementById("newSetupName").value = "";
    loadSetups();
  });
}

function updateSetup(id, name) {
  fetch(`/api/setups/${id}`, {
    method: "PATCH",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ setup_name: name })
  });
}

function updateSetupColor(id, color) {
  fetch(`/api/setups/${id}`, {
    method: "PATCH",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ color })
  }).then(loadSetups);
}

function deleteSetup(id) {
  if (!confirm("Delete this setup?")) return;
  fetch(`/api/setups/${id}`, { method: "DELETE" }).then(loadSetups);
}

/* ================= EMOTIONS ================= */

async function loadEmotions() {
  const data = await fetch("/api/emotions").then(r => r.json()).catch(() => []);
  const container = document.getElementById("emotionsList");
  container.innerHTML = "";

  if (!data.length) {
    container.innerHTML = `<span class="muted" style="font-size:12px;">No emotions yet.</span>`;
    return;
  }

  data.forEach(e => {
    const el = document.createElement("div");
    el.className = "tag-edit-row";
    el.innerHTML = `
      <span class="setup-tag" style="background:${e.color || '#3a4050'}">
        <input value="${e.emotion}" onchange="updateEmotion(${e.id}, this.value)">
        <span class="tag-remove" onclick="deleteEmotion(${e.id})">×</span>
      </span>
      <input type="color" value="${e.color || '#3a4050'}" onchange="updateEmotionColor(${e.id}, this.value)">
    `;
    container.appendChild(el);
  });
}

function addEmotion() {
  const name = document.getElementById("newEmotionName").value;
  const color = document.getElementById("newEmotionColor").value;
  if (!name.trim()) return;
  fetch("/api/emotions", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ emotion: name, color })
  }).then(() => {
    document.getElementById("newEmotionName").value = "";
    loadEmotions();
  });
}

function updateEmotion(id, emotion) {
  fetch(`/api/emotions/${id}`, {
    method: "PATCH",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ emotion })
  });
}

function updateEmotionColor(id, color) {
  fetch(`/api/emotions/${id}`, {
    method: "PATCH",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ color })
  }).then(loadEmotions);
}

function deleteEmotion(id) {
  if (!confirm("Delete this emotion?")) return;
  fetch(`/api/emotions/${id}`, { method: "DELETE" }).then(loadEmotions);
}

/* ================= TIMEZONE ================= */

function loadTimezone() {
  const tzSelect = document.getElementById("timezoneSelect");
  const TIMEZONES = Intl.supportedValuesOf("timeZone");
  tzSelect.innerHTML = TIMEZONES.map(tz =>
    `<option value="${tz}">${tz.replace(/_/g, " ")}</option>`
  ).join("");

  fetch("/api/settings")
    .then(r => r.json())
    .then(data => {
      tzSelect.value = data.timezone || Intl.DateTimeFormat().resolvedOptions().timeZone;
    });

  tzSelect.addEventListener("change", () => {
    fetch("/api/settings", {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ timezone: tzSelect.value })
    });
  });
}

loadAccounts();
loadStrategies();
loadSetups();
loadEmotions();
loadFees();
loadTimezone();

</script>

{% endblock %}
