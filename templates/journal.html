{% extends "base.html" %}
{% block title %}Journal{% endblock %}
{% block content %}

<div class="journal-header">
  <h2>Trade Journal</h2>

  <div class="view-toggle">

    <!-- TABLE ICON -->
    <span class="toggle-icon table-icon">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"
           stroke="currentColor" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="1" width="12" height="14" rx="2"/>
        <line x1="5" y1="5" x2="11" y2="5"/>
        <line x1="5" y1="8" x2="11" y2="8"/>
        <line x1="5" y1="11" x2="9" y2="11"/>
      </svg>
    </span>

    <label class="switch">
      <input type="checkbox" id="viewSwitch" onchange="toggleView()">
      <span class="slider"></span>
    </label>

    <!-- CHART ICON -->
    <span class="toggle-icon chart-icon">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"
          stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1,12 5,7 9,9 15,3"/>
        <polyline points="11,3 15,3 15,7"/>
      </svg>
    </span>

  </div>
</div>


<!-- ================= CONTROLS ================= -->
<div class="journal-controls">
  <div class="journal-controls-left">
    <div class="date-group">
      <label class="date-label">From
        <input type="date" id="dateFrom" class="dark-input">
      </label>
      <label class="date-label">To
        <input type="date" id="dateTo" class="dark-input">
      </label>
      <button onclick="applyFiltersAndRender()">Apply</button>
      <button onclick="resetFilters()">Reset</button>
    </div>
  </div>
  <div class="journal-controls-right">
    <button onclick="applyFeesToSelected()">Apply fees</button>
    <button class="btn-danger" onclick="deleteSelected()">Delete selected</button>
  </div>
</div>

<!-- New Collapsible Filter System -->
<div class="filter-panel">
  <div class="filter-headers">
    <div class="filter-header-item" data-filter="strategy" onclick="toggleFilterSection('strategy')">
      <span>Strategies</span>
      <svg class="chevron" width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    
    <div class="filter-header-item" data-filter="setup" onclick="toggleFilterSection('setup')">
      <span>Setups</span>
      <svg class="chevron" width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    
    <div class="filter-header-item" data-filter="emotion" onclick="toggleFilterSection('emotion')">
      <span>Emotions</span>
      <svg class="chevron" width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <!-- Expandable sections -->
  <div id="strategySection" class="filter-section" style="display: none;">
    <div class="filter-section-inner">
      <div class="filter-logic-row">
        <span class="filter-logic-label">Match:</span>
        <div class="logic-toggle-inline">
          <button class="logic-btn-inline active" data-logic="or" onclick="setFilterLogic('strategy', 'or')">Any</button>
          <button class="logic-btn-inline" data-logic="and" onclick="setFilterLogic('strategy', 'and')">All</button>
        </div>
      </div>
      <div id="strategyFilter" class="filter-buttons-grid"></div>
    </div>
  </div>

  <div id="setupSection" class="filter-section" style="display: none;">
    <div class="filter-section-inner">
      <div class="filter-logic-row">
        <span class="filter-logic-label">Match:</span>
        <div class="logic-toggle-inline">
          <button class="logic-btn-inline active" data-logic="or" onclick="setFilterLogic('setup', 'or')">Any</button>
          <button class="logic-btn-inline" data-logic="and" onclick="setFilterLogic('setup', 'and')">All</button>
        </div>
      </div>
      <div id="setupFilter" class="filter-buttons-grid"></div>
    </div>
  </div>

  <div id="emotionSection" class="filter-section" style="display: none;">
    <div class="filter-section-inner">
      <div class="filter-logic-row">
        <span class="filter-logic-label">Match:</span>
        <div class="logic-toggle-inline">
          <button class="logic-btn-inline active" data-logic="or" onclick="setFilterLogic('emotion', 'or')">Any</button>
          <button class="logic-btn-inline" data-logic="and" onclick="setFilterLogic('emotion', 'and')">All</button>
        </div>
      </div>
      <div id="emotionFilter" class="filter-buttons-grid"></div>
    </div>
  </div>

  <!-- Active filters display -->
  <div id="activeFilters" class="active-filters" style="display: none;"></div>
</div>

<!-- Table + Chart column -->
<div id="tableView" style="display:flex; gap:20px; align-items:flex-start;">

  <div style="flex:2;">
    <table id="tradeTable">
      <thead><tr id="headerRow"></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div style="flex:1; display:flex; flex-direction:column; gap:20px;">
    <div style="height:220px;">
      <canvas id="pnlChart"></canvas>
    </div>
    <div id="journalStats" class="journal-stats"></div>
  </div>
</div>

<!-- NEW: Chart Grid View -->
<div id="chartView" style="display:none;">
  <div id="chartGrid" class="chart-grid"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let originalData = [];
let charts       = {};
let openRow      = null;
let STRATEGIES   = [];
let SETUPS       = [];
let EMOTIONS     = [];
let dataReady    = false;
let setupsByTrade   = {};
let emotionsByTrade = {};
let currentAccountRequest = 0;

// Filter logic state
let filterLogic = {
  strategy: 'or',
  setup: 'or',
  emotion: 'or'
};

// Active filters
let activeFilters = {
  strategy: new Set(),
  setup: new Set(),
  emotion: new Set()
};

// ── Helpers ────────────────────────────────────────────────────────────────
const pad        = n  => String(n).padStart(2, "0");
const formatDate = d  => `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
const formatTime = d  => `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
const formatPnL  = v  => { const n=Number(v)||0; const f=Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2}); return n<0?`($${f})`:`$${f}`; };
const toNum      = v  => Number(v);

const COLUMN_ORDER = ["select","symbol","entryTimestamp","exitTimestamp","duration","side","qty","entryPrice","exitPrice","pnl"];
const COLUMN_NAMES = { select:"", symbol:"Symbol", entryTimestamp:"Entry Time", exitTimestamp:"Exit Time", duration:"Duration", side:"Side", qty:"Qty", entryPrice:"Entry Price", exitPrice:"Exit Price", pnl:"PnL" };

function waitForAccount() {
  return new Promise(resolve => {
    if (window.accountSelectorReady) return resolve();
    document.addEventListener("accountReady", resolve, { once: true });
  });
}

// ── Filter Section Toggle ──────────────────────────────────────────────────
function toggleFilterSection(type) {
  const section = document.getElementById(`${type}Section`);
  const header = document.querySelector(`[data-filter="${type}"]`);
  const isOpen = section.style.display !== 'none';
  
  if (isOpen) {
    section.style.display = 'none';
    header.classList.remove('open');
  } else {
    section.style.display = 'block';
    header.classList.add('open');
  }
}

// ── Set Filter Logic ───────────────────────────────────────────────────────
function setFilterLogic(type, logic) {
  filterLogic[type] = logic;
  
  const container = document.querySelector(`#${type}Section .logic-toggle-inline`);
  container.querySelectorAll('.logic-btn-inline').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.logic === logic);
  });
  
  applyFiltersAndRender();
}

// ── Toggle Filter ──────────────────────────────────────────────────────────
function toggleFilter(type, id, btn) {
  const numId = toNum(id);
  
  if (activeFilters[type].has(numId)) {
    activeFilters[type].delete(numId);
    btn.classList.remove('active');
  } else {
    activeFilters[type].add(numId);
    btn.classList.add('active');
  }
  
  updateActiveFiltersDisplay();
  applyFiltersAndRender();
}

// ── Update Active Filters Display ──────────────────────────────────────────
function updateActiveFiltersDisplay() {
  const container = document.getElementById('activeFilters');
  const hasFilters = activeFilters.strategy.size > 0 || 
                     activeFilters.setup.size > 0 || 
                     activeFilters.emotion.size > 0;
  
  if (!hasFilters) {
    container.style.display = 'none';
    return;
  }
  
  container.style.display = 'block';
  let html = '<div class="active-filters-label">Active filters:</div><div class="active-filters-tags">';
  
  // Strategies
  activeFilters.strategy.forEach(id => {
    const s = STRATEGIES.find(x => toNum(x.id) === id);
    if (s) {
      html += `<span class="active-filter-tag" style="background:${s.color}" onclick="removeActiveFilter('strategy', ${id})">${s.strategy_name} ×</span>`;
    }
  });
  
  // Setups
  activeFilters.setup.forEach(id => {
    const s = SETUPS.find(x => toNum(x.id) === id);
    if (s) {
      html += `<span class="active-filter-tag" style="background:${s.color}" onclick="removeActiveFilter('setup', ${id})">${s.setup_name} ×</span>`;
    }
  });
  
  // Emotions
  activeFilters.emotion.forEach(id => {
    const e = EMOTIONS.find(x => toNum(x.id) === id);
    if (e) {
      html += `<span class="active-filter-tag" style="background:${e.color || '#3a4050'}" onclick="removeActiveFilter('emotion', ${id})">${e.emotion} ×</span>`;
    }
  });
  
  html += '</div>';
  container.innerHTML = html;
}

// ── Remove Active Filter ───────────────────────────────────────────────────
function removeActiveFilter(type, id) {
  const numId = toNum(id);
  activeFilters[type].delete(numId);
  
  // Update button state
  const btn = document.querySelector(`#${type}Filter button[data-id="${id}"]`);
  if (btn) btn.classList.remove('active');
  
  updateActiveFiltersDisplay();
  applyFiltersAndRender();
}

function applyFiltersAndRender() {
  if (!dataReady) return;

  const fromVal = document.getElementById("dateFrom")?.value;
  const toVal   = document.getElementById("dateTo")?.value;
  const fromD   = fromVal ? new Date(fromVal) : null;
  const toD     = toVal   ? new Date(toVal + "T23:59:59") : null;

  let data = originalData.slice();

  // Date range
  if (fromD) data = data.filter(t => t.entryTimestamp >= fromD);
  if (toD)   data = data.filter(t => t.entryTimestamp <= toD);

  // Column text filters
  document.querySelectorAll("th input[data-col]").forEach(input => {
    if (!input.value) return;
    const val = input.value.toLowerCase();
    data = data.filter(r => String(r[input.dataset.col] ?? "").toLowerCase().includes(val));
  });

  // Setup filter
  if (activeFilters.setup.size > 0) {
    const selectedSetups = Array.from(activeFilters.setup);
    if (filterLogic.setup === 'and') {
      data = data.filter(t => selectedSetups.every(id => t.setups.includes(id)));
    } else {
      data = data.filter(t => selectedSetups.some(id => t.setups.includes(id)));
    }
  }

  // Strategy filter
  if (activeFilters.strategy.size > 0) {
    const activeStrategies = Array.from(activeFilters.strategy);
    if (filterLogic.strategy === 'and') {
      data = data.filter(t => activeStrategies.every(id => toNum(t.key_strategies_id) === id));
    } else {
      data = data.filter(t => activeStrategies.includes(toNum(t.key_strategies_id)));
    }
  }

  // Emotion filter
  if (activeFilters.emotion.size > 0) {
    const activeEmotions = Array.from(activeFilters.emotion);
    if (filterLogic.emotion === 'and') {
      data = data.filter(t => activeEmotions.every(id => t.emotions.includes(id)));
    } else {
      data = data.filter(t => activeEmotions.some(id => t.emotions.includes(id)));
    }
  }

  // Account filter
  const acct = accountSelect?.value;
  if (acct) data = data.filter(t => String(t.key_trading_accounts) === String(acct));

  data.sort((a, b) => a.entryTimestamp - b.entryTimestamp);

  if (currentView === "table") {
    buildRows(data);
    updatePnLChart(data);
    renderJournalStats(data);
  } else {
    renderChartGrid(data);
  }
}

// ── Read URL params ────────────────────────────────────────────────────────
function loadFiltersFromURL() {
  const params = new URLSearchParams(window.location.search);
  const from = params.get("from");
  const to = params.get("to");
  
  if (from) document.getElementById("dateFrom").value = from;
  if (to) document.getElementById("dateTo").value = to;
}

loadFiltersFromURL();

// ── Init ───────────────────────────────────────────────────────────────────
Promise.all([
  fetch("/api/strategies").then(r => r.json()),
  fetch("/api/setups").then(r => r.json()),
  fetch("/api/trade_setups").then(r => r.json()),
  fetch("/api/emotions").then(r => r.json()).catch(() => []),
  fetch("/api/emotions_trades").then(r => r.json()).catch(() => []),
]).then(async ([strategies, setups, tradeSetups, emotions, emotionTrades]) => {
  await waitForAccount();

  STRATEGIES = strategies;
  SETUPS     = setups;
  EMOTIONS   = emotions;

  // Build strategy filter buttons
  const strategyContainer = document.getElementById("strategyFilter");
  strategyContainer.innerHTML = "";
  STRATEGIES.forEach(s => {
    const btn = document.createElement("button");
    btn.textContent  = s.strategy_name;
    btn.dataset.id   = s.id;
    btn.style.background = s.color;
    btn.onclick = (e) => toggleFilter('strategy', s.id, btn);
    strategyContainer.appendChild(btn);
  });

  // Build setup filter buttons
  const setupContainer = document.getElementById("setupFilter");
  setupContainer.innerHTML = "";
  SETUPS.forEach(s => {
    const btn = document.createElement("button");
    btn.textContent  = s.setup_name;
    btn.dataset.id   = s.id;
    btn.style.background = s.color;
    btn.onclick = (e) => toggleFilter('setup', s.id, btn);
    setupContainer.appendChild(btn);
  });

  // Build emotion filter buttons
  const emotionContainer = document.getElementById("emotionFilter");
  emotionContainer.innerHTML = "";
  EMOTIONS.forEach(e => {
    const btn = document.createElement("button");
    btn.textContent  = e.emotion;
    btn.dataset.id   = e.id;
    btn.style.background = e.color || "#3a4050";
    btn.onclick = (ev) => toggleFilter('emotion', e.id, btn);
    emotionContainer.appendChild(btn);
  });

  // Fetch raw trades
  const rawTrades = await fetchFilteredTrades({ account: accountSelect?.value });

  // Build lookup maps
  setupsByTrade   = {};
  tradeSetups.forEach(ts => {
    const tid = toNum(ts.key_trade_id);
    (setupsByTrade[tid] = setupsByTrade[tid] || []).push(toNum(ts.key_setup_id));
  });

  emotionsByTrade = {};
  emotionTrades.forEach(et => {
    const tid = toNum(et.trade_id);
    (emotionsByTrade[tid] = emotionsByTrade[tid] || []).push(toNum(et.emotions_id));
  });

  // Enrich trades
  originalData = rawTrades.map(t => ({
    ...t,
    id:             toNum(t.id),
    entryTimestamp: new Date(t.entryTimestamp),
    exitTimestamp:  new Date(t.exitTimestamp),
    setups:         setupsByTrade[toNum(t.id)]   || [],
    emotions:       emotionsByTrade[toNum(t.id)] || [],
  }));

  buildHeaders();
  dataReady = true;
  applyFiltersAndRender();
}).catch(err => {
  console.error("Journal init failed:", err);
});

let currentView = "table";

function toggleView() {
  const checked = document.getElementById("viewSwitch").checked;
  currentView = checked ? "chart" : "table";

  document.getElementById("tableView").style.display = checked ? "none" : "flex";
  document.getElementById("chartView").style.display = checked ? "block" : "none";
  document.querySelector(".journal-controls-right").style.display = checked ? "none" : "flex";

  applyFiltersAndRender();
}

async function applyFeesToSelected() {
  const checked = [...document.querySelectorAll(".row-select:checked")];
  if (!checked.length) { alert("No trades selected."); return; }

  const ids = checked.map(cb => Number(cb.dataset.id));
  const res = await fetch("/api/trades/apply-fees", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ ids })
  });

  if (!res.ok) { alert("Failed to apply fees."); return; }

  const updatedTrades = await res.json();
  updatedTrades.forEach(updated => {
    const t = originalData.find(x => x.id === updated.id);
    if (t) {
      t.fees = updated.fees;
      t.pnl  = updated.pnl;
    }
  });

  applyFiltersAndRender();
}

function resetFilters() {
  document.getElementById("dateFrom").value = "";
  document.getElementById("dateTo").value   = "";
  document.querySelectorAll("th input[data-col]").forEach(i => i.value = "");
  
  // Clear active filters
  activeFilters = { strategy: new Set(), setup: new Set(), emotion: new Set() };
  
  // Reset button states
  document.querySelectorAll(".filter-buttons-grid button").forEach(b => b.classList.remove("active"));
  
  // Reset logic to OR
  filterLogic = { strategy: 'or', setup: 'or', emotion: 'or' };
  document.querySelectorAll(".logic-toggle-inline").forEach(group => {
    group.querySelectorAll(".logic-btn-inline").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.logic === "or");
    });
  });
  
  // Close all sections
  document.querySelectorAll(".filter-section").forEach(s => s.style.display = "none");
  document.querySelectorAll(".filter-header-item").forEach(h => h.classList.remove("open"));
  
  updateActiveFiltersDisplay();
  window.history.replaceState({}, "", "/journal");
  applyFiltersAndRender();
}

function renderChartGrid(data) {
  const grid = document.getElementById("chartGrid");
  if (!grid) return;

  grid.innerHTML = "";

  data.forEach(trade => {
    const card = document.createElement("div");
    card.className = "chart-card";

    card.innerHTML = `
      <div class="chart-card-image"
           onclick="openChartOverlay('${trade.id}','${trade.symbol}',${trade.entryPrice},${trade.exitPrice})">
        <div id="chart-${trade.id}" class="chart-img"></div>
      </div>

      <div class="chart-card-info">
        <span class="chart-symbol">${trade.symbol}</span>
        <span class="side-${String(trade.side).toLowerCase()}" style="font-size:11px;font-weight:500;">
          ${trade.side}
        </span>
        <span class="chart-pnl ${Number(trade.pnl) >= 0 ? "pnl-positive" : "pnl-negative"}">
          ${formatPnL(trade.pnl)}
        </span>
      </div>
    `;

    grid.appendChild(card);
    showTradeChart(trade, `chart-${trade.id}`);
  });
}

function renderJournalStats(data) {
  const statsEl = document.getElementById("journalStats");
  if (!statsEl) return;
  const totalTrades = data.length;
  const longs    = data.filter(t => String(t.side).toLowerCase() === "long");
  const shorts   = data.filter(t => String(t.side).toLowerCase() === "short");
  const longPnL  = longs.reduce((s, t)  => s + (Number(t.pnl) || 0), 0);
  const shortPnL = shorts.reduce((s, t) => s + (Number(t.pnl) || 0), 0);
  const wins     = data.filter(t => Number(t.pnl) > 0).length;
  const winRate  = totalTrades ? ((wins / totalTrades) * 100).toFixed(1) : 0;
  statsEl.innerHTML = `
    <div class="stat-block"><span class="stat-block-label">Total trades</span><span class="stat-block-val">${totalTrades}</span></div>
    <div class="stat-block"><span class="stat-block-label">Longs</span><span class="stat-block-val">${longs.length} — <span class="${longPnL>=0?"positive":"negative"}">${longPnL>=0?"+":""}$${longPnL.toFixed(2)}</span></span></div>
    <div class="stat-block"><span class="stat-block-label">Shorts</span><span class="stat-block-val">${shorts.length} — <span class="${shortPnL>=0?"positive":"negative"}">${shortPnL>=0?"+":""}$${shortPnL.toFixed(2)}</span></span></div>
    <div class="stat-block"><span class="stat-block-label">Win rate</span><span class="stat-block-val">${winRate}%</span></div>`;
}

async function deleteSelected() {
  const checked = [...document.querySelectorAll(".row-select:checked")];
  if (!checked.length) { alert("No trades selected."); return; }
  if (!confirm(`Delete ${checked.length} trade(s)?`)) return;
  const ids = checked.map(cb => toNum(cb.dataset.id));
  const res = await fetch("/api/trades", { method: "DELETE", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ ids }) });
  if (res.ok) {
    originalData = originalData.filter(t => !ids.includes(t.id));
    applyFiltersAndRender();
  } else {
    alert("Delete failed.");
  }
}

function buildHeaders() {
  const tr = document.getElementById("headerRow");
  tr.innerHTML = "";
  COLUMN_ORDER.forEach(col => {
    const th = document.createElement("th");
    if (col === "select") {
      const cb = document.createElement("input");
      cb.type    = "checkbox";
      cb.onclick = e => document.querySelectorAll(".row-select").forEach(x => x.checked = e.target.checked);
      th.appendChild(cb);
    } else {
      th.textContent = COLUMN_NAMES[col] ?? col;
      const input = document.createElement("input");
      input.placeholder  = "Filter";
      input.dataset.col  = col;
      input.onkeyup      = applyFiltersAndRender;
      th.append(document.createElement("br"), input);
    }
    tr.appendChild(th);
  });
}

function buildRows(data) {
  const tbody = document.querySelector("#tradeTable tbody");
  tbody.innerHTML = "";
  data.forEach(row => {
    const original = originalData.find(t => t.id === row.id) || row;
    const tr = document.createElement("tr");
    tr.className = "trade-row";
    tr.onclick   = () => toggleTradeDetails(tr, original);
    COLUMN_ORDER.forEach(col => {
      const td = document.createElement("td");
      if (col === "select") {
        const cb = document.createElement("input");
        cb.type      = "checkbox";
        cb.className = "row-select";
        cb.dataset.id = row.id;
        cb.addEventListener("click", e => e.stopPropagation());
        td.appendChild(cb);
      } else if (col === "pnl") {
        const v = Number(row[col]) || 0;
        td.textContent = formatPnL(v);
        td.className   = v >= 0 ? "pnl-positive" : "pnl-negative";
      } else if (col === "side") {
        td.textContent = row[col] ?? "";
        td.className   = `side-${String(row[col]).toLowerCase()}`;
      } else if (col.includes("Timestamp")) {
        td.textContent = formatDate(row[col]);
      } else {
        td.textContent = row[col] ?? "";
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function renderStrategyTag(strategyId) {
  const sid = toNum(strategyId);
  if (!sid) return `<span class="strategy-tag muted" data-remove-strategy>None ×</span>`;
  const s = STRATEGIES.find(x => toNum(x.id) === sid);
  if (!s) return "";
  return `<span class="strategy-tag" style="background:${s.color}" data-remove-strategy>${s.strategy_name} ×</span>`;
}

function renderSetupTags(trade) {
  if (!trade.setups?.length) return `<span class="setup-tag muted">No setup</span>`;
  return trade.setups.map(id => {
    const s = SETUPS.find(x => toNum(x.id) === toNum(id));
    if (!s) return "";
    return `<span class="setup-tag" style="background:${s.color};">${s.setup_name}<span class="tag-remove" onclick="removeSetup(event,${trade.id},${id})">×</span></span>`;
  }).join("");
}

function renderEmotionTags(trade) {
  if (!trade.emotions?.length) return `<span class="setup-tag muted">None</span>`;
  const tags = trade.emotions.map(id => {
    const e = EMOTIONS.find(x => toNum(x.id) === toNum(id));
    if (!e) return "";
    return `<span class="setup-tag" style="background:${e.color || "#3a4050"};">${e.emotion}<span class="tag-remove" onclick="removeEmotion(event,${trade.id},${id})">×</span></span>`;
  }).join("");
  return tags || `<span class="setup-tag muted">None</span>`;
}

function removeSetup(e, tradeId, setupId) {
  e.stopPropagation();
  const tid = toNum(tradeId);
  const sid = toNum(setupId);
  fetch("/api/trade_setups", {
    method: "DELETE",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ trade_id: tid, setup_id: sid })
  }).then(() => {
    const trade = originalData.find(t => t.id === tid);
    if (!trade) return;
    trade.setups = trade.setups.filter(id => toNum(id) !== sid);
    const container = openRow?.panel?.querySelector(".setup-tag-container");
    if (container) container.innerHTML = renderSetupTags(trade);
  });
}

function removeEmotion(e, tradeId, emotionId) {
  e.stopPropagation();
  const tid = toNum(tradeId);
  const eid = toNum(emotionId);
  fetch("/api/emotions_trades", {
    method: "DELETE",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ trade_id: tid, emotions_id: eid })
  }).then(() => {
    const trade = originalData.find(t => t.id === tid);
    if (!trade) return;
    trade.emotions = trade.emotions.filter(id => toNum(id) !== eid);
    const container = openRow?.panel?.querySelector(".emotion-tag-container");
    if (container) container.innerHTML = renderEmotionTags(trade);
  });
}

function toggleTradeDetails(tr, trade) {
  if (openRow && openRow.tr === tr) { closeDetails(); return; }
  closeDetails();
  tr.classList.add("expanded");

  const strategyOptions = [
    `<option value="">No strategy</option>`,
    ...STRATEGIES.map(s => `<option value="${s.id}" ${toNum(s.id) === toNum(trade.key_strategies_id) ? "selected" : ""}>${s.strategy_name}</option>`)
  ].join("");

  const detailsTr = document.createElement("tr");
  detailsTr.className = "trade-details-row";
  const td = document.createElement("td");
  td.colSpan = COLUMN_ORDER.length;

  const durSec = Math.round((trade.exitTimestamp - trade.entryTimestamp) / 1000);
  const durH   = Math.floor(durSec / 3600);
  const durM   = Math.floor((durSec % 3600) / 60);
  const durS   = durSec % 60;

  td.innerHTML = `
    <div class="trade-details">
      <div class="td-grid">
        <div class="td-col">
          <div class="td-section-label">Trade details</div>
          <div class="td-info-grid">
            <span class="td-label">Entry</span>    <span class="td-val">${formatTime(trade.entryTimestamp)}</span>
            <span class="td-label">Exit</span>     <span class="td-val">${formatTime(trade.exitTimestamp)}</span>
            <span class="td-label">Duration</span> <span class="td-val">${pad(durH)}:${pad(durM)}:${pad(durS)}</span>
            <span class="td-label">Fees</span>     <span class="td-val">${formatPnL(trade.fees ?? 0)}</span>
            <span class="td-label">PnL</span>      <span class="td-val ${Number(trade.pnl)>=0?"pnl-positive":"pnl-negative"}">${formatPnL(trade.pnl)}</span>
          </div>
          <div style="margin-top:10px;">
            <div class="td-section-label" style="margin-bottom:5px;">Notes</div>
            <textarea class="trade-notes dark-textarea" rows="4" placeholder="Add trade notes...">${trade.notes ?? ""}</textarea>
          </div>
          <div style="margin-top:10px;">
            <div class="td-section-label" style="margin-bottom:5px;">Emotions</div>
            <select class="emotion-add dark-select">
              <option value="">+ Add emotion</option>
              ${EMOTIONS.map(e => `<option value="${e.id}">${e.emotion}</option>`).join("")}
            </select>
            <div class="emotion-tag-container">${renderEmotionTags(trade)}</div>
          </div>
        </div>

        <div class="td-col">
          <div class="td-section-label">Strategy</div>
          <select class="trade-strategy dark-select">${strategyOptions}</select>
          <div class="strategy-tag-container">${renderStrategyTag(trade.key_strategies_id)}</div>

          <div class="td-section-label" style="margin-top:10px;">Setups</div>
          <select class="setup-add dark-select">
            <option value="">+ Add setup</option>
            ${SETUPS.map(s => `<option value="${s.id}">${s.setup_name}</option>`).join("")}
          </select>
          <div class="setup-tag-container">${renderSetupTags(trade)}</div>
        </div>

        <div class="td-col td-col-chart">
          <div class="td-section-label">Chart <span style="font-size:9px;color:var(--text-faint);font-weight:400;letter-spacing:0;text-transform:none;margin-left:4px;">click to expand</span></div>
          <div id="tradeChart-${trade.id}" class="chart-clickable" style="height:340px;"
               onclick="openChartOverlay('${trade.id}','${trade.symbol}',${trade.entryPrice},${trade.exitPrice})"></div>
        </div>
      </div>
    </div>`;

  detailsTr.appendChild(td);
  tr.after(detailsTr);
  const panel = td.querySelector(".trade-details");
  panel.offsetHeight;
  requestAnimationFrame(() => panel.classList.add("open"));
  openRow = { tr, detailsTr, panel };

  showTradeChart(trade, `tradeChart-${trade.id}`);

  const notesEl = td.querySelector(".trade-notes");
  let notesTimer = null;
  notesEl.addEventListener("input", () => {
    clearTimeout(notesTimer);
    notesTimer = setTimeout(() => {
      fetch(`/api/trades/${trade.id}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ notes: notesEl.value })
      });
      trade.notes = notesEl.value;
    }, 600);
  });

  const strategySelect    = td.querySelector(".trade-strategy");
  const strategyContainer = td.querySelector(".strategy-tag-container");
  strategySelect.addEventListener("change", () => {
    const val = strategySelect.value || null;
    fetch(`/api/trades/${trade.id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ key_strategies_id: val })
    });
    trade.key_strategies_id = val ? toNum(val) : null;
    strategyContainer.innerHTML = renderStrategyTag(trade.key_strategies_id);
    attachStrategyRemoveHandler(trade, strategyContainer);
  });
  attachStrategyRemoveHandler(trade, strategyContainer);

  const setupSelect    = td.querySelector(".setup-add");
  const setupContainer = td.querySelector(".setup-tag-container");
  setupSelect.addEventListener("change", async () => {
    const setupId = setupSelect.value;
    if (!setupId) return;
    const sid = toNum(setupId);
    if (trade.setups.includes(sid)) { setupSelect.value = ""; return; }
    await fetch("/api/trade_setups", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ key_trade_id: trade.id, key_setup_id: sid })
    });
    trade.setups.push(sid);
    setupContainer.innerHTML = renderSetupTags(trade);
    setupSelect.value = "";
  });

  const emotionSelect    = td.querySelector(".emotion-add");
  const emotionContainer = td.querySelector(".emotion-tag-container");
  emotionSelect.addEventListener("change", async () => {
    const emotionId = emotionSelect.value;
    if (!emotionId) return;
    const eid = toNum(emotionId);
    if (trade.emotions.includes(eid)) { emotionSelect.value = ""; return; }

    await fetch("/api/emotions_trades", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ trade_id: trade.id, emotions_id: eid })
    });

    trade.emotions.push(eid);
    emotionContainer.innerHTML = renderEmotionTags(trade);
    emotionSelect.value = "";
  });
}

const accountSelect = document.getElementById("accountSelect");

if (accountSelect) accountSelect.addEventListener("change", async () => {
  const accountId = accountSelect.value;
  if (!accountId) return;

  const requestId = ++currentAccountRequest;

  const [rawTrades, tradeSetups, emotionTrades] = await Promise.all([
    fetchFilteredTrades({ account: accountId }),
    fetch("/api/trade_setups").then(r => r.json()),
    fetch("/api/emotions_trades").then(r => r.json())
  ]);

  if (requestId !== currentAccountRequest) return;

  setupsByTrade = {};
  tradeSetups.forEach(ts => {
    const tid = toNum(ts.key_trade_id);
    (setupsByTrade[tid] = setupsByTrade[tid] || []).push(toNum(ts.key_setup_id));
  });

  emotionsByTrade = {};
  emotionTrades.forEach(et => {
    const tid = toNum(et.trade_id);
    (emotionsByTrade[tid] = emotionsByTrade[tid] || []).push(toNum(et.emotions_id));
  });

  originalData = enrichTrades(rawTrades);
  applyFiltersAndRender();
});

function updatePnLChart(data) {
  const ctx = document.getElementById("pnlChart");
  if (!ctx) return;
  if (charts.pnl) charts.pnl.destroy();
  const daily = {};
  data.forEach(t => {
    const d = t.entryTimestamp.toISOString().slice(0, 10);
    daily[d] = (daily[d] || 0) + (Number(t.pnl) || 0);
  });
  const dates = Object.keys(daily).sort();
  let cum = 0;
  const values = dates.map(d => (cum += daily[d], +cum.toFixed(2)));
  charts.pnl = new Chart(ctx, {
    type: "line",
    data: {
      labels: dates,
      datasets: [{
        data: values,
        borderColor: "#34c38f",
        borderWidth: 2,
        fill: true,
        tension: 0.3,
        pointRadius: 0,
        backgroundColor: ctx2 => {
          const { chartArea } = ctx2.chart;
          if (!chartArea) return "transparent";
          const g = ctx2.chart.ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
          g.addColorStop(0, "rgba(52,195,143,0.18)");
          g.addColorStop(1, "rgba(52,195,143,0)");
          return g;
        }
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { display: false },
        y: {
          ticks: { color: "#5a6070", font: { size: 10, family: "'IBM Plex Mono'" }, callback: v => `$${v}` },
          grid: { color: "rgba(255,255,255,0.04)" }
        }
      }
    }
  });
}

function enrichTrades(rawTrades) {
  return rawTrades.map(t => ({
    ...t,
    id: toNum(t.id),
    entryTimestamp: new Date(t.entryTimestamp),
    exitTimestamp:  new Date(t.exitTimestamp),
    setups:   setupsByTrade[toNum(t.id)]   || [],
    emotions: emotionsByTrade[toNum(t.id)] || [],
  }));
}

function attachStrategyRemoveHandler(trade, container) {
  const tag = container.querySelector("[data-remove-strategy]");
  if (tag) tag.addEventListener("click", () => {
    fetch(`/api/trades/${trade.id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ key_strategies_id: null })
    });
    trade.key_strategies_id = null;
    container.innerHTML = renderStrategyTag(null);
    attachStrategyRemoveHandler(trade, container);
  });
}

function closeDetails() {
  if (!openRow) return;
  const { tr, detailsTr, panel } = openRow;
  tr.classList.remove("expanded");
  panel.classList.remove("open");
  setTimeout(() => detailsTr.remove(), 250);
  openRow = null;
}

function openChartOverlay(tradeId, symbol, entryPrice, exitPrice) {
  const overlay = document.createElement("div");
  overlay.className = "chart-overlay";
  overlay.id        = "chartOverlay";
  overlay.innerHTML = `
    <div class="chart-overlay-inner">
      <div class="chart-overlay-header">
        <span class="chart-overlay-title">${symbol} — Entry ${entryPrice} · Exit ${exitPrice}</span>
        <button class="chart-overlay-close" onclick="closeChartOverlay()">✕</button>
      </div>
      <div class="chart-overlay-body">
        <div id="chartOverlayContent" style="height:100%;min-height:500px;"></div>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener("click", e => { if (e.target === overlay) closeChartOverlay(); });
  document.addEventListener("keydown", overlayKeyHandler);
  const trade = originalData.find(t => t.id == toNum(tradeId));
  if (trade) showTradeChart(trade, "chartOverlayContent");
}

function closeChartOverlay() {
  const overlay = document.getElementById("chartOverlay");
  if (overlay) overlay.remove();
  document.removeEventListener("keydown", overlayKeyHandler);
}

function overlayKeyHandler(e) {
  if (e.key === "Escape") closeChartOverlay();
}

async function showTradeChart(trade, containerId) {
  const chartEl = document.getElementById(containerId);
  if (!chartEl) return;
  chartEl.innerHTML = "";
  if (trade.chart_image) {
    chartEl.innerHTML = `<img src="data:image/png;base64,${trade.chart_image}" style="width:100%;height:100%;object-fit:contain;border-radius:6px;"/>`;
    return;
  }
  chartEl.innerHTML = `<div style="height:340px;display:flex;align-items:center;justify-content:center;background:var(--bg-elevated);border-radius:6px;color:var(--text-faint);font-size:12px;">No chart available</div>`;
}
</script>
