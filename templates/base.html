<!DOCTYPE html>
<html>
<head>
  <title>{% block title %}My App{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script src="{{ url_for('static', filename='js/trade.js') }}"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h1>Trading Futures</h1>

    <div id="global-account-selector" style="margin-bottom: 12px;">
      <label>
        Account:
        <select id="accountSelect">
          <option value="">All accounts</option>
        </select>
      </label>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const select = document.getElementById("accountSelect");
      if (!select) return;

      const res = await fetch("/api/accounts");
      const accounts = await res.json();

      select.innerHTML = `<option value="">All accounts</option>`;
      accounts.forEach(acc => {
        const opt = document.createElement("option");
        opt.value = acc.id;
        opt.textContent = acc.name;
        select.appendChild(opt);
      });

      const saved = localStorage.getItem("selectedAccountId");
      if (saved) select.value = saved;

      select.addEventListener("change", () => {
        localStorage.setItem("selectedAccountId", select.value);
      });

      window.accountSelectorReady = true;
      document.dispatchEvent(new Event("accountReady"));
    });
    </script>

    <a class="menu-item" href="{{ url_for('dashboard') }}">
      📊 Dashboard
    </a>

    <a class="menu-item" href="{{ url_for('journal') }}">
      📓 Journal
    </a>

    <a class="menu-item" href="{{ url_for('charts') }}">
      📈 Charts
    </a>

    <a class="menu-item" href="{{ url_for('upload_file') }}">
      ➕ New Trades
    </a>

    <a class="menu-item" href="{{ url_for('settings') }}">
      ⚙️ Settings
    </a>

  </div>

  <!-- RIGHT COLUMN: banner + main -->
  <div style="flex:1; display:flex; flex-direction:column; overflow:hidden;">

    <!-- HOLIDAY BANNER -->
    <div class="holiday-banner" id="holidayBanner">
      <span class="holiday-label">🗓 Next Market Holidays:</span>
      <span id="holidayItems" style="display:flex; gap:8px; flex-wrap:wrap;">
        <span style="color:#6b7280;">Loading...</span>
      </span>
    </div>

    <!-- PAGE CONTENT -->
    <div class="main">
      {% block content %}{% endblock %}
    </div>

  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  try {
    const res = await fetch("https://api.polygon.io/v1/marketstatus/upcoming?apiKey=6rdLRUwlnX57vXQBzS2p1nz4x0Ce_7ZS");
    const data = await res.json();

    const holidays = data
      .filter(h => h.exchange === "NYSE" || h.name)
      .filter((h, i, arr) => arr.findIndex(x => x.date === h.date) === i)
      .slice(0, 4);

    const container = document.getElementById("holidayItems");
    if (!holidays.length) {
      container.innerHTML = `<span style="color:#6b7280;">No upcoming holidays found.</span>`;
      return;
    }

    const today = new Date();
    container.innerHTML = holidays.map((h, i) => {
      const date = new Date(h.date);
      const diffDays = Math.ceil((date - today) / (1000 * 60 * 60 * 24));
      const label = date.toLocaleDateString("en-US", { month: "short", day: "numeric" });
      const sep = i < holidays.length - 1 ? `<span class="holiday-separator">·</span>` : "";
      return `
        <span class="holiday-item">
          <span>${h.name}</span>
          <span style="color:#9ca3af;">${label}</span>
          <span class="holiday-days">${diffDays}d</span>
        </span>${sep}`;
    }).join("");
  } catch (e) {
    document.getElementById("holidayItems").innerHTML =
      `<span style="color:#6b7280;">Could not load holidays.</span>`;
  }
});
</script>

</body>
</html>
