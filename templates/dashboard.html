{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<h2>Monthly Trading Calendar</h2>

<div class="calendar-controls-modern">
  <button id="prevMonth" class="cal-nav">◀</button>
  <div class="calendar-current">
    <span id="calendarLabel"></span>
  </div>
  <button id="nextMonth" class="cal-nav">▶</button>
</div>

<div class="calendar-wrapper">
  <div id="tradingCalendar" class="calendar-grid"></div>
  <div id="calendarMonthTotal" class="calendar-month-total"></div>
</div>

<!-- ── STAT PILLS ── -->
<div class="stat-pills" id="statPills"></div>

<div class="dashboard-stats">
  <div id="monthlyStats" class="dashboard-card">
    <canvas id="monthlyEquityChart" height="120"></canvas>
    <div class="stats-content"></div>
  </div>

  <div id="accountStats" class="dashboard-card">
    <canvas id="accountEquityChart" height="120"></canvas>
    <div class="stats-content"></div>
  </div>
</div>

<!-- ── VISUAL ROW 1: Target Chart ── -->
<div class="dashboard-charts-row" style="margin-top:20px;">

  <div class="dashboard-card" style="flex:1;">
    <div class="card-label">Cumulative PnL vs Target</div>
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
      <label style="font-size:11px; color:var(--text-muted);">Daily target $</label>
      <input type="number" id="targetInput" value="200" min="0" step="50"
        style="width:80px; background:var(--bg-active); border:1px solid var(--border-strong);
               border-radius:var(--radius-sm); color:var(--text-primary); padding:3px 7px;
               font-family:var(--font-mono); font-size:12px; outline:none;">
    </div>
    <canvas id="targetChart" height="130"></canvas>
  </div>

</div>

<!-- ── VISUAL ROW 2: Scatter + Day of week + Duration ── -->
<div class="dashboard-charts-row" style="margin-top:16px;">

  <div class="dashboard-card" style="flex:2;">
    <div class="card-label">PnL by Hour (Full Account)</div>
    <canvas id="hourScatterChart" height="140"></canvas>
  </div>

  <div class="dashboard-card" style="flex:1.4;">
    <div class="card-label">Win Rate by Day</div>
    <canvas id="dowChart" height="140"></canvas>
  </div>

  <div class="dashboard-card" style="flex:1.4;">
    <div class="card-label">Trade Duration</div>
    <div id="durationStats" class="duration-stats"></div>
  </div>

</div>

<style>
/* ── STAT PILLS ── */
.stat-pills {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  max-width: 600px;
  margin-bottom: 16px;
}

.stat-pill {
  flex: 1;
  min-width: 120px;
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-lg);
  padding: 10px 14px;
}

.stat-pill-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 4px;
}

.stat-pill-value {
  font-family: var(--font-mono);
  font-size: 17px;
  font-weight: 500;
  color: var(--text-primary);
}

.stat-pill-value.positive { color: var(--accent-green); }
.stat-pill-value.negative { color: var(--accent-red); }
.stat-pill-value.neutral  { color: var(--accent-blue); }

/* ── CHART ROW ── */
.dashboard-charts-row {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.dashboard-charts-row .dashboard-card {
  min-width: 180px;
}

.card-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 10px;
}

/* ── DURATION STATS ── */
.duration-stats {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 4px;
}

.dur-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 0;
  border-bottom: 1px solid var(--border-subtle);
  font-size: 12px;
  color: var(--text-muted);
}

.dur-row:last-child { border-bottom: none; }

.dur-val {
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--text-secondary);
}
</style>

<script>
let isRendering = false;
let pendingRender = false;

const accountSelect = document.getElementById("accountSelect");
if (accountSelect) accountSelect.addEventListener("change", renderCalendar);

const calendarEl = document.getElementById("tradingCalendar");

const MONTHS = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
];

let currentDate = new Date();
const calendarLabel = document.getElementById("calendarLabel");

function updateCalendarLabel() {
  calendarLabel.textContent = `${MONTHS[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
}

document.getElementById("prevMonth").onclick = () => {
  currentDate.setMonth(currentDate.getMonth() - 1);
  updateCalendarLabel();
  renderCalendar();
};

document.getElementById("nextMonth").onclick = () => {
  currentDate.setMonth(currentDate.getMonth() + 1);
  updateCalendarLabel();
  renderCalendar();
};

updateCalendarLabel();

/* ===================== RENDER CALENDAR ===================== */

async function renderCalendar() {
  if (isRendering) { pendingRender = true; return; }
  isRendering = true;
  pendingRender = false;

  calendarEl.innerHTML = "";

  const month = currentDate.getMonth();
  const year  = currentDate.getFullYear();

  const from = new Date(year, month, 1).toISOString().slice(0,10);
  const to   = new Date(year, month + 1, 0).toISOString().slice(0,10);

  let monthlyTrades = await fetchFilteredTrades({ account: accountSelect?.value, from, to }) || [];
  let accountTrades = await fetchFilteredTrades({ account: accountSelect?.value }) || [];

  monthlyTrades = monthlyTrades.map(t => ({ ...t, entryDate: new Date(t.entryTimestamp) }));
  accountTrades = accountTrades.map(t => ({ ...t, entryDate: new Date(t.entryTimestamp) }));

  renderDashboardStats(monthlyTrades, accountTrades, month, year);

  const firstDay    = new Date(year, month, 1);
  const lastDay     = new Date(year, month + 1, 0);
  const startWeekday = (firstDay.getDay() + 6) % 7;
  const daysInMonth  = lastDay.getDate();

  ["Mon","Tue","Wed","Thu","Fri"].forEach(d => {
    const h = document.createElement("div");
    h.className = "calendar-header";
    h.textContent = d;
    calendarEl.appendChild(h);
  });

  for (let i = 0; i < Math.min(startWeekday, 5); i++)
    calendarEl.appendChild(document.createElement("div"));

  const monthlyTotal = { trades: 0, pnl: 0 };

  for (let day = 1; day <= daysInMonth; day++) {
    const dateObj = new Date(year, month, day);
    if (dateObj.getDay() === 0 || dateObj.getDay() === 6) continue;

    const isoDate  = dateObj.toISOString().slice(0,10);
    const dayTrades = monthlyTrades.filter(t => t.entryDate.toISOString().slice(0,10) === isoDate);
    const tradeCount = dayTrades.length;
    const dayPnL     = dayTrades.reduce((s,t) => s + (Number(t.pnl)||0), 0);

    monthlyTotal.trades += tradeCount;
    monthlyTotal.pnl    += dayPnL;

    const pnlClass = tradeCount === 0 ? "day-flat" : dayPnL > 0 ? "day-positive" : dayPnL < 0 ? "day-negative" : "day-flat";

    const cell = document.createElement("div");
    cell.className = `calendar-day ${pnlClass}`;
    cell.dataset.date = isoDate;
    cell.innerHTML = `
      <div class="calendar-date">${day}</div>
      <div class="calendar-trades">${tradeCount} trade${tradeCount!==1?"s":""}</div>
      <div class="calendar-pnl ${dayPnL>0?"positive":dayPnL<0?"negative":""}">
        ${tradeCount ? `${dayPnL>=0?"+":""}$${dayPnL.toFixed(2)}` : ""}
      </div>`;
    calendarEl.appendChild(cell);
  }

  document.getElementById("calendarMonthTotal").innerHTML = `
    <strong>Month total</strong>
    <span>${monthlyTotal.trades} trades</span>
    <span class="${monthlyTotal.pnl>=0?"positive":"negative"}" style="font-family:var(--font-mono)">
      ${monthlyTotal.pnl>=0?"+":""}$${monthlyTotal.pnl.toFixed(2)}
    </span>`;

  isRendering = false;
  if (pendingRender) renderCalendar();
}

/* ===================== CHART INSTANCES ===================== */

let monthlyChartInstance = null;
let accountChartInstance = null;
let targetChartInstance  = null;
let hourScatterInstance  = null;
let dowChartInstance     = null;

/* ===================== DASHBOARD STATS ===================== */

function renderDashboardStats(monthlyTrades, accountTrades, month, year) {

  /* ── helpers ── */
  function buildDailyEquity(trades) {
    const grouped = {};
    trades.forEach(t => {
      const d = new Date(t.entryDate).toISOString().slice(0,10);
      grouped[d] = (grouped[d] || 0) + (Number(t.pnl) || 0);
    });
    const keys = Object.keys(grouped).sort((a,b) => new Date(a)-new Date(b));
    let cum = 0;
    const labels = [], data = [];
    keys.forEach(k => { cum += grouped[k]; labels.push(k); data.push(cum); });
    return { labels, data };
  }

  function buildAccountEquity(trades) {
    const grouped = {};
    trades.forEach(t => {
      const d = new Date(t.entryDate).toISOString().slice(0,10);
      grouped[d] = (grouped[d] || 0) + (Number(t.pnl) || 0);
    });
    const keys = Object.keys(grouped).sort((a,b) => new Date(a)-new Date(b));
    let cum = 0;
    const labels = [], data = [];
    keys.forEach(k => { cum += grouped[k]; labels.push(k); data.push(cum); });
    return { labels, data };
  }

  function computeStats(trades) {
    const pnl    = trades.reduce((s,t) => s + (Number(t.pnl)||0), 0);
    const wins   = trades.filter(t => Number(t.pnl) > 0);
    const losses = trades.filter(t => Number(t.pnl) < 0);
    const avgWin  = wins.length   ? wins.reduce((s,t)=>s+Number(t.pnl),0)/wins.length   : 0;
    const avgLoss = losses.length ? losses.reduce((s,t)=>s+Number(t.pnl),0)/losses.length : 0;
    const winRate = trades.length ? (wins.length / trades.length * 100).toFixed(1) : 0;
    const grossWin  = wins.reduce((s,t)=>s+Number(t.pnl),0);
    const grossLoss = Math.abs(losses.reduce((s,t)=>s+Number(t.pnl),0));
    const profitFactor = grossLoss > 0 ? (grossWin / grossLoss).toFixed(2) : "∞";
    return { pnl, wins, losses, avgWin, avgLoss, winRate, profitFactor };
  }

  /* ── max drawdown ── */
  function maxDrawdown(equity) {
    let peak = -Infinity, maxDD = 0;
    equity.forEach(v => {
      if (v > peak) peak = v;
      const dd = peak - v;
      if (dd > maxDD) maxDD = dd;
    });
    return maxDD;
  }

  /* ── streak ── */
  function streaks(trades) {
    const days = {};
    trades.forEach(t => {
      const d = new Date(t.entryDate).toISOString().slice(0,10);
      days[d] = (days[d] || 0) + (Number(t.pnl)||0);
    });
    const sorted = Object.values(days).map(Number);
    let best = 0, worst = 0, cur = 0;
    sorted.forEach(v => {
      cur = v > 0 ? cur + 1 : (v < 0 ? 0 : cur);
      if (cur > best) best = cur;
    });
    cur = 0;
    sorted.forEach(v => {
      cur = v < 0 ? cur + 1 : (v > 0 ? 0 : cur);
      if (cur > worst) worst = cur;
    });
    return { best, worst };
  }

  /* ── duration ── */
  function durationStats(trades) {
    const withDur = trades.filter(t => t.exitTimestamp && t.entryTimestamp);
    if (!withDur.length) return null;
    const mins = withDur.map(t => (new Date(t.exitTimestamp) - new Date(t.entryTimestamp)) / 60000);
    const avg  = mins.reduce((a,b)=>a+b,0) / mins.length;
    const min  = Math.min(...mins);
    const max  = Math.max(...mins);
    const fmt  = m => m < 60 ? `${Math.round(m)}m` : `${Math.floor(m/60)}h ${Math.round(m%60)}m`;
    return { avg: fmt(avg), min: fmt(min), max: fmt(max), count: withDur.length };
  }

  /* ── hour PnL scatter data ── */
  function hourPnLScatter(trades) {
    const points = [];
    trades.forEach(t => {
      const h = new Date(t.entryTimestamp).getHours();
      const pnl = Number(t.pnl) || 0;
      points.push({ x: h, y: pnl });
    });
    return points;
  }

  /* ── day-of-week win rate ── */
  function dowWinRate(trades) {
    const days = ["Mon","Tue","Wed","Thu","Fri"];
    const buckets = days.map(() => ({ wins: 0, total: 0 }));
    trades.forEach(t => {
      const d = (new Date(t.entryTimestamp).getDay() + 6) % 7; // Mon=0
      if (d > 4) return;
      buckets[d].total++;
      if (Number(t.pnl) > 0) buckets[d].wins++;
    });
    return {
      labels: days,
      data: buckets.map(b => b.total ? +(b.wins/b.total*100).toFixed(1) : 0),
      counts: buckets.map(b => b.total)
    };
  }

  /* ── target line ── */
  function buildTargetData(trades, dailyTarget) {
    const grouped = {};
    trades.forEach(t => {
      const d = new Date(t.entryDate).toISOString().slice(0,10);
      grouped[d] = (grouped[d] || 0) + (Number(t.pnl)||0);
    });
    const keys = Object.keys(grouped).sort((a,b)=>new Date(a)-new Date(b));
    let cumActual = 0, cumTarget = 0;
    const labels = [], actual = [], target = [];
    keys.forEach((k, i) => {
      cumActual += grouped[k];
      cumTarget  = (i + 1) * dailyTarget;
      labels.push(k);
      actual.push(+cumActual.toFixed(2));
      target.push(+cumTarget.toFixed(2));
    });
    return { labels, actual, target };
  }

  /* ===================== COMPUTE ===================== */

  const monthlyEquity = buildDailyEquity(monthlyTrades);
  const accountEquity = buildAccountEquity(accountTrades);
  const m  = computeStats(monthlyTrades);
  const a  = computeStats(accountTrades);
  const dd = maxDrawdown(accountEquity.data);
  const st = streaks(accountTrades);
  const dur = durationStats(accountTrades);
  const scatter = hourPnLScatter(accountTrades);
  const dw  = dowWinRate(accountTrades);

  /* ===================== STAT PILLS ===================== */

  document.getElementById("statPills").innerHTML = `
    <div class="stat-pill">
      <div class="stat-pill-label">Best streak</div>
      <div class="stat-pill-value positive">${st.best}d</div>
    </div>
    <div class="stat-pill">
      <div class="stat-pill-label">Worst streak</div>
      <div class="stat-pill-value negative">${st.worst}d</div>
    </div>
    <div class="stat-pill">
      <div class="stat-pill-label">Max drawdown</div>
      <div class="stat-pill-value negative">-$${dd.toFixed(2)}</div>
    </div>
    <div class="stat-pill">
      <div class="stat-pill-label">Profit factor</div>
      <div class="stat-pill-value neutral">${a.profitFactor}</div>
    </div>`;

  /* ===================== EQUITY CHARTS ===================== */

  if (monthlyChartInstance) monthlyChartInstance.destroy();
  monthlyChartInstance = new Chart(document.getElementById("monthlyEquityChart"), {
    type: "line",
    data: {
      labels: monthlyEquity.labels,
      datasets: [{
        label: "Monthly Equity",
        data: monthlyEquity.data,
        tension: 0.35,
        borderColor: "#5b8ef5",
        borderWidth: 2,
        fill: true,
        backgroundColor: ctx => {
          const { chartArea } = ctx.chart;
          if (!chartArea) return "transparent";
          const g = ctx.chart.ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
          g.addColorStop(0, "rgba(91,142,245,0.18)");
          g.addColorStop(1, "rgba(91,142,245,0)");
          return g;
        },
        pointRadius: 0
      }]
    },
    options: {
      responsive: true,
      animation: { duration: 1000, easing: "easeOutQuart" },
      plugins: {
        legend: { display: false },
        title: {
          display: true,
          text: `${MONTHS[month].toUpperCase()} ${year}`,
          align: "start",
          color: "rgba(255,255,255,0.06)",
          font: { size: 20, weight: "700", family: "'DM Sans', sans-serif" },
          padding: { bottom: -30 }
        }
      },
      scales: { x: { display: false }, y: { display: false, grid: { display: false } } },
      elements: { line: { borderColor: "#5b8ef5", borderWidth: 2 }, point: { radius: 0 } }
    }
  });

  if (accountChartInstance) accountChartInstance.destroy();
  accountChartInstance = new Chart(document.getElementById("accountEquityChart"), {
    type: "line",
    data: {
      labels: accountEquity.labels,
      datasets: [{
        data: accountEquity.data,
        tension: 0.35,
        borderColor: "#34c38f",
        borderWidth: 2,
        fill: true,
        backgroundColor: ctx => {
          const { chartArea } = ctx.chart;
          if (!chartArea) return "transparent";
          const g = ctx.chart.ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
          g.addColorStop(0, "rgba(52,195,143,0.18)");
          g.addColorStop(1, "rgba(52,195,143,0)");
          return g;
        },
        pointRadius: 0
      }]
    },
    options: {
      responsive: true,
      animation: { duration: 1000, easing: "easeOutQuart" },
      plugins: {
        legend: { display: false },
        title: {
          display: true,
          text: "FULL ACCOUNT",
          align: "start",
          color: "rgba(255,255,255,0.06)",
          font: { size: 20, weight: "700", family: "'DM Sans', sans-serif" },
          padding: { bottom: -30 }
        }
      },
      scales: { x: { display: false }, y: { display: false, grid: { display: false } } },
      elements: { line: { borderColor: "#34c38f", borderWidth: 2 }, point: { radius: 0 } }
    }
  });

  /* ===================== TARGET CHART ===================== */

  function renderTargetChart() {
    const dailyTarget = parseFloat(document.getElementById("targetInput").value) || 200;
    const td = buildTargetData(monthlyTrades, dailyTarget);

    if (targetChartInstance) targetChartInstance.destroy();
    targetChartInstance = new Chart(document.getElementById("targetChart"), {
      type: "line",
      data: {
        labels: td.labels,
        datasets: [
          {
            label: "Actual",
            data: td.actual,
            borderColor: "#5b8ef5",
            borderWidth: 2,
            tension: 0.35,
            fill: true,
            backgroundColor: ctx => {
              const { chartArea } = ctx.chart;
              if (!chartArea) return "transparent";
              const g = ctx.chart.ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
              g.addColorStop(0, "rgba(91,142,245,0.15)");
              g.addColorStop(1, "rgba(91,142,245,0)");
              return g;
            },
            pointRadius: 0
          },
          {
            label: "Target",
            data: td.target,
            borderColor: "rgba(232,169,74,0.6)",
            borderWidth: 1.5,
            borderDash: [5, 4],
            tension: 0,
            fill: false,
            pointRadius: 0
          }
        ]
      },
      options: {
        responsive: true,
        animation: { duration: 800 },
        plugins: {
          legend: {
            display: true,
            labels: { color: "#5a6070", font: { size: 10 }, boxWidth: 12, padding: 10 }
          }
        },
        scales: {
          x: { ticks: { color: "#5a6070", font: { size: 10 } }, grid: { color: "rgba(255,255,255,0.04)" } },
          y: { ticks: { color: "#5a6070", font: { size: 10, family: "'IBM Plex Mono'" }, callback: v => `$${v}` }, grid: { color: "rgba(255,255,255,0.04)" } }
        }
      }
    });
  }

  renderTargetChart();
  document.getElementById("targetInput").addEventListener("change", renderTargetChart);

  /* ===================== HOUR SCATTER CHART ===================== */

  if (hourScatterInstance) hourScatterInstance.destroy();
  hourScatterInstance = new Chart(document.getElementById("hourScatterChart"), {
    type: "scatter",
    data: {
      datasets: [{
        label: "Trades",
        data: scatter,
        backgroundColor: scatter.map(p => p.y >= 0 ? "rgba(52,195,143,0.6)" : "rgba(229,83,83,0.6)"),
        borderColor: scatter.map(p => p.y >= 0 ? "rgba(52,195,143,0.8)" : "rgba(229,83,83,0.8)"),
        borderWidth: 1,
        pointRadius: 4,
        pointHoverRadius: 6,
        tension: 0
      }]
    },
    options: {
      responsive: true,
      animation: { duration: 800 },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const point = ctx.raw;
              return ` Hour ${String(Math.floor(point.x)).padStart(2,'0')}:00 → $${point.y.toFixed(2)}`;
            }
          }
        }
      },
      scales: {
        x: {
          title: { display: true, text: "Hour of Day", color: "#5a6070", font: { size: 11, weight: 500 } },
          min: 0,
          max: 23,
          ticks: { color: "#5a6070", font: { size: 10 }, stepSize: 2, callback: v => `${String(v).padStart(2,'0')}:00` },
          grid: { color: "rgba(255,255,255,0.04)" }
        },
        y: {
          title: { display: true, text: "PnL ($)", color: "#5a6070", font: { size: 11, weight: 500 } },
          ticks: { color: "#5a6070", font: { size: 10, family: "'IBM Plex Mono'" }, callback: v => `$${v}` },
          grid: { color: "rgba(255,255,255,0.04)" }
        }
      }
    }
  });

  /* ===================== DAY OF WEEK CHART ===================== */

  if (dowChartInstance) dowChartInstance.destroy();
  dowChartInstance = new Chart(document.getElementById("dowChart"), {
    type: "bar",
    data: {
      labels: dw.labels,
      datasets: [{
        data: dw.data,
        backgroundColor: dw.data.map(v => v >= 60 ? "rgba(52,195,143,0.75)" : v >= 40 ? "rgba(91,142,245,0.75)" : "rgba(229,83,83,0.65)"),
        borderRadius: 4,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true,
      animation: { duration: 800 },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.raw}% win rate (${dw.counts[ctx.dataIndex]} trades)`
          }
        }
      },
      scales: {
        x: { ticks: { color: "#5a6070", font: { size: 11 } }, grid: { display: false } },
        y: {
          min: 0, max: 100,
          ticks: { color: "#5a6070", font: { size: 10 }, callback: v => `${v}%` },
          grid: { color: "rgba(255,255,255,0.04)" }
        }
      }
    }
  });

  /* ===================== DURATION STATS ===================== */

  const durationEl = document.getElementById("durationStats");
  if (dur) {
    durationEl.innerHTML = `
      <div class="dur-row"><span>Avg hold</span> <span class="dur-val">${dur.avg}</span></div>
      <div class="dur-row"><span>Shortest</span> <span class="dur-val">${dur.min}</span></div>
      <div class="dur-row"><span>Longest</span>  <span class="dur-val">${dur.max}</span></div>
      <div class="dur-row"><span>Tracked</span>  <span class="dur-val">${dur.count} trades</span></div>`;
  } else {
    durationEl.innerHTML = `<div style="color:var(--text-faint); font-size:12px; margin-top:10px;">No exit timestamps found.<br>Add exitTimestamp to your trades.</div>`;
  }

  /* ===================== STATS CARDS ===================== */

  document.querySelector("#monthlyStats .stats-content").innerHTML = `
    <h4>${MONTHS[month]} ${year}</h4>
    <div><span>Trades</span>    <strong>${monthlyTrades.length}</strong></div>
    <div><span>PnL</span>       <strong class="${m.pnl>=0?"positive":"negative"}" style="font-family:var(--font-mono)">${m.pnl>=0?"+":""}$${m.pnl.toFixed(2)}</strong></div>
    <div><span>Win Rate</span>  <strong>${m.winRate}%</strong></div>
    <div><span>Avg Win</span>   <strong class="positive" style="font-family:var(--font-mono)">+$${m.avgWin.toFixed(2)}</strong></div>
    <div><span>Avg Loss</span>  <strong class="negative" style="font-family:var(--font-mono)">$${m.avgLoss.toFixed(2)}</strong></div>
    <div><span>Profit factor</span> <strong style="color:var(--accent-blue)">${m.profitFactor}</strong></div>`;

  document.querySelector("#accountStats .stats-content").innerHTML = `
    <h4>Full Account</h4>
    <div><span>Trades</span>    <strong>${accountTrades.length}</strong></div>
    <div><span>PnL</span>       <strong class="${a.pnl>=0?"positive":"negative"}" style="font-family:var(--font-mono)">${a.pnl>=0?"+":""}$${a.pnl.toFixed(2)}</strong></div>
    <div><span>Win Rate</span>  <strong>${a.winRate}%</strong></div>
    <div><span>Avg Win</span>   <strong class="positive" style="font-family:var(--font-mono)">+$${a.avgWin.toFixed(2)}</strong></div>
    <div><span>Avg Loss</span>  <strong class="negative" style="font-family:var(--font-mono)">$${a.avgLoss.toFixed(2)}</strong></div>
    <div><span>Profit factor</span> <strong style="color:var(--accent-blue)">${a.profitFactor}</strong></div>`;
}

/* ===================== CLICK DAY ===================== */

document.addEventListener("click", e => {
  const day = e.target.closest(".calendar-day");
  if (!day) return;
  const date = day.dataset.date;
  if (!date) return;
  window.location.href = `/journal?from=${date}&to=${date}`;
});

function waitForAccount() {
  return new Promise(resolve => {
    if (window.accountSelectorReady) return resolve();
    document.addEventListener("accountReady", resolve, { once: true });
  });
}

waitForAccount().then(() => renderCalendar());
</script>

{% endblock %}
