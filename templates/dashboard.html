{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}


<h2>Monthly Trading Calendar</h2>

<div class="calendar-controls">
  <select id="calendarMonth"></select>
  <select id="calendarYear"></select>
</div>

<div class="calendar-wrapper">
  <div id="tradingCalendar" class="calendar-grid"></div>
</div>


<script>

/* =================== Setup month/year selecion =================== */
const monthSelect = document.getElementById("calendarMonth");
const yearSelect = document.getElementById("calendarYear");
const calendarEl = document.getElementById("tradingCalendar");

const MONTHS = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
];

// populate month selector
MONTHS.forEach((m, i) => {
  const opt = document.createElement("option");
  opt.value = i;
  opt.textContent = m;
  monthSelect.appendChild(opt);
});

// populate year selector
const currentYear = new Date().getFullYear();
for (let y = currentYear - 5; y <= currentYear + 1; y++) {
  const opt = document.createElement("option");
  opt.value = y;
  opt.textContent = y;
  yearSelect.appendChild(opt);
}

// default to current month/year
const now = new Date();
monthSelect.value = now.getMonth();
yearSelect.value = now.getFullYear();



/* =================== Fetch trades & build the calendar =================== */
let trades = [];

fetch("/api/trades")
  .then(r => r.json())
  .then(data => {
    trades = data.map(t => ({
      ...t,
      entryDate: new Date(t.entryTimestamp)
    }));
    renderCalendar();
  });

monthSelect.onchange = renderCalendar;
yearSelect.onchange = renderCalendar;



/* =================== Calendar rendering logic ===================== */
function renderCalendar() {
  calendarEl.innerHTML = "";

  const month = Number(monthSelect.value);
  const year = Number(yearSelect.value);

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startWeekday = firstDay.getDay(); // 0 = Sunday
  const daysInMonth = lastDay.getDate();

  /* ---------- headers ---------- */
  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d => {
    const h = document.createElement("div");
    h.className = "calendar-header";
    h.textContent = d;
    calendarEl.appendChild(h);
  });

  /* ---------- weekly + monthly aggregates ---------- */
  const weeklyTotals = {};
  const monthlyTotal = { trades: 0, pnl: 0 };

  trades.forEach(t => {
    const d = new Date(t.entryDate);
    if (d.getMonth() !== month || d.getFullYear() !== year) return;

    const weekKey = getISOWeek(d);
    weeklyTotals[weekKey] ??= { trades: 0, pnl: 0 };
    weeklyTotals[weekKey].trades += 1;
    weeklyTotals[weekKey].pnl += Number(t.pnl) || 0;

    monthlyTotal.trades += 1;
    monthlyTotal.pnl += Number(t.pnl) || 0;
  });

  /* ---------- empty cells ---------- */
  for (let i = 0; i < startWeekday; i++) {
    calendarEl.appendChild(document.createElement("div"));
  }

  /* ---------- days ---------- */
  let currentWeekKey = null;

  for (let day = 1; day <= daysInMonth; day++) {
    const dateObj = new Date(year, month, day);
    const weekKey = getISOWeek(dateObj);

    if (currentWeekKey && weekKey !== currentWeekKey) {
      insertWeeklyTotal(currentWeekKey);
    }
    currentWeekKey = weekKey;

    const cell = document.createElement("div");
    cell.className = "calendar-day";

    const isoDate = `${year}-${String(month + 1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    cell.dataset.date = isoDate;

    const dayTrades = trades.filter(t =>
      t.entryDate.getFullYear() === year &&
      t.entryDate.getMonth() === month &&
      t.entryDate.getDate() === day
    );

    const tradeCount = dayTrades.length;
    const dayPnL = dayTrades.reduce((s, t) => s + (Number(t.pnl) || 0), 0);

    cell.innerHTML = `
      <div class="calendar-date">${day}</div>
      <div class="calendar-trades">${tradeCount} trade${tradeCount !== 1 ? "s" : ""}</div>
      <div class="calendar-pnl ${dayPnL >= 0 ? "positive" : "negative"}">
        ${tradeCount ? `$${dayPnL.toFixed(2)}` : ""}
      </div>
    `;

    calendarEl.appendChild(cell);
  }

  insertWeeklyTotal(currentWeekKey);
  insertMonthlyTotal(monthlyTotal);
}


function getISOWeek(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  const week = Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
  return `${date.getUTCFullYear()}-W${week}`;
}

function insertWeeklyTotal(weekKey) {
  const w = weeklyTotals[weekKey];
  if (!w) return;

  const row = document.createElement("div");
  row.className = "calendar-week-total";
  row.innerHTML = `
    <span>Week total</span>
    <span>${w.trades} trades</span>
    <span>${w.pnl >= 0 ? "+" : ""}$${w.pnl.toFixed(2)}</span>
  `;
  calendarEl.appendChild(row);
}

function insertMonthlyTotal(total) {
  const row = document.createElement("div");
  row.className = "calendar-month-total";
  row.innerHTML = `
    <strong>Month total</strong>
    <span>${total.trades} trades</span>
    <span>${total.pnl >= 0 ? "+" : ""}$${total.pnl.toFixed(2)}</span>
  `;
  calendarEl.appendChild(row);
}

/* =================== Goes to journal with filtered day ======================== */
document.addEventListener("click", e => {
  const day = e.target.closest(".calendar-day");
  if (!day) return;

  const date = day.dataset.date;
  if (!date) return;

  window.location.href = `/journal?from=${date}&to=${date}`;
});

</script>


{% endblock %}
