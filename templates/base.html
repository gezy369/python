<!DOCTYPE html>
<html>
<head>
  <title>{% block title %}My App{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script src="{{ url_for('static', filename='js/trade.js') }}"></script>

<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h1>Futures</h1>
    <p class="logo-sub">trading journal</p>

    <div id="global-account-selector">
      <label>Account</label>
      <select id="accountSelect">
        <option value="">All accounts</option>
      </select>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const select = document.getElementById("accountSelect");
      if (!select) return;

      const res = await fetch("/api/accounts");
      const accounts = await res.json();

      select.innerHTML = `<option value="">All accounts</option>`;
      accounts.forEach(acc => {
        const opt = document.createElement("option");
        opt.value = acc.id;
        opt.textContent = acc.name;
        select.appendChild(opt);
      });

      const saved = localStorage.getItem("selectedAccountId");
      if (saved) select.value = saved;

      select.addEventListener("change", () => {
        localStorage.setItem("selectedAccountId", select.value);
      });

      window.accountSelectorReady = true;
      document.dispatchEvent(new Event("accountReady"));
    });
    </script>

    <!-- Dashboard -->
    <a class="menu-item {{ 'active' if request.endpoint == 'dashboard' }}" href="{{ url_for('dashboard') }}">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="1" width="6" height="6" rx="1.5"/>
        <rect x="9" y="1" width="6" height="6" rx="1.5"/>
        <rect x="1" y="9" width="6" height="6" rx="1.5"/>
        <rect x="9" y="9" width="6" height="6" rx="1.5"/>
      </svg>
      Dashboard
    </a>

    <!-- Journal -->
    <a class="menu-item {{ 'active' if request.endpoint == 'journal' }}" href="{{ url_for('journal') }}">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="1" width="12" height="14" rx="2"/>
        <line x1="5" y1="5" x2="11" y2="5"/>
        <line x1="5" y1="8" x2="11" y2="8"/>
        <line x1="5" y1="11" x2="9"  y2="11"/>
      </svg>
      Journal
    </a>

    <!-- Charts -->
    <a class="menu-item {{ 'active' if request.endpoint == 'charts' }}" href="{{ url_for('charts') }}">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1,12 5,7 9,9 15,3"/>
        <polyline points="11,3 15,3 15,7"/>
      </svg>
      Charts
    </a>

    <!-- New Trades -->
    <a class="menu-item {{ 'active' if request.endpoint == 'upload_file' }}" href="{{ url_for('upload_file') }}">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="8" cy="8" r="7"/>
        <line x1="8" y1="5" x2="8" y2="11"/>
        <line x1="5" y1="8" x2="11" y2="8"/>
      </svg>
      New Trades
    </a>

    <!-- Settings (pushed to bottom) -->
    <a class="menu-item {{ 'active' if request.endpoint == 'settings' }}" href="{{ url_for('settings') }}" style="margin-top: auto;">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="8" cy="8" r="2.5"/>
        <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.22 3.22l1.42 1.42M11.36 11.36l1.42 1.42M3.22 12.78l1.42-1.42M11.36 4.64l1.42-1.42"/>
      </svg>
      Settings
    </a>

    <!-- Logout -->
    <a class="menu-item menu-item-logout" href="{{ url_for('logout') }}">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3"/>
        <polyline points="10 11 14 8 10 5"/>
        <line x1="14" y1="8" x2="5" y2="8"/>
      </svg>
      Logout
    </a>

  </div>

  <!-- RIGHT COLUMN: banner + main -->
  <div style="flex:1; display:flex; flex-direction:column; overflow:hidden;">

    <!-- HOLIDAY BANNER -->
    <div class="holiday-banner" id="holidayBanner">
      <span class="holiday-label">Holidays</span>
      <span id="holidayItems" style="display:flex; gap:8px; flex-wrap:wrap;">
        <span style="color:#3a4050;">Loading...</span>
      </span>
    </div>

    <!-- PAGE CONTENT -->
    <div class="main">
      {% block content %}{% endblock %}
    </div>

  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  try {
    const res = await fetch("https://api.polygon.io/v1/marketstatus/upcoming?apiKey=6rdLRUwlnX57vXQBzS2p1nz4x0Ce_7ZS");
    const data = await res.json();

    const holidays = data
      .filter(h => h.exchange === "NYSE" || h.name)
      .filter((h, i, arr) => arr.findIndex(x => x.date === h.date) === i)
      .slice(0, 4);

    const container = document.getElementById("holidayItems");
    if (!holidays.length) {
      container.innerHTML = `<span style="color:#3a4050;">No upcoming holidays found.</span>`;
      return;
    }

    const today = new Date();
    container.innerHTML = holidays.map((h, i) => {
      const date = new Date(h.date);
      const diffDays = Math.ceil((date - today) / (1000 * 60 * 60 * 24));
      const label = date.toLocaleDateString("en-US", { month: "short", day: "numeric" });
      const sep = i < holidays.length - 1 ? `<span class="holiday-separator">·</span>` : "";
      return `
        <span class="holiday-item">
          <span>${h.name}</span>
          <span style="color:#3a4050;">${label}</span>
          <span class="holiday-days">${diffDays}d</span>
        </span>${sep}`;
    }).join("");
  } catch (e) {
    document.getElementById("holidayItems").innerHTML =
      `<span style="color:#3a4050;">Could not load holidays.</span>`;
  }
});
</script>

</body>
</html>
