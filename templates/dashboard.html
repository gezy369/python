{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<h2>Monthly Trading Calendar</h2>

<div class="calendar-controls">
  <select id="calendarMonth"></select>
  <select id="calendarYear"></select>
</div>

<div class="calendar-wrapper">
  <div id="tradingCalendar" class="calendar-grid"></div>
  <!-- 👇 Monthly total goes HERE -->
  <div id="calendarMonthTotal" class="calendar-month-total"></div>
</div>

<script>

// helper to filter trades by accounts
async function fetchFilteredTrades(filters = {}) {
  const params = new URLSearchParams();

  if (filters.account) params.set("account", filters.account);
  if (filters.from) params.set("from", filters.from);
  if (filters.to) params.set("to", filters.to);

  const res = await fetch(`/api/trades?${params.toString()}`);
  return await res.json();
}

//Render calendar on account change
const accountSelect = document.getElementById("accountSelect");
if (accountSelect) {
  accountSelect.addEventListener("change", () => {
    renderCalendar();
  });
}

/* =================== Setup month/year selection =================== */
const monthSelect = document.getElementById("calendarMonth");
const yearSelect = document.getElementById("calendarYear");
const calendarEl = document.getElementById("tradingCalendar");

const MONTHS = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
];

// populate month selector
MONTHS.forEach((m, i) => {
  const opt = document.createElement("option");
  opt.value = i;
  opt.textContent = m;
  monthSelect.appendChild(opt);
});

// populate year selector
const currentYear = new Date().getFullYear();
for (let y = currentYear - 5; y <= currentYear + 1; y++) {
  const opt = document.createElement("option");
  opt.value = y;
  opt.textContent = y;
  yearSelect.appendChild(opt);
}

// default to current month/year
const now = new Date();
monthSelect.value = now.getMonth();
yearSelect.value = now.getFullYear();

/* =================== Fetch trades =================== */
let trades = [];

fetch("/api/trades")
  .then(r => r.json())
  .then(data => {
    trades = data.map(t => ({
      ...t,
      entryDate: new Date(t.entryTimestamp)
    }));
    renderCalendar();
  });

monthSelect.onchange = renderCalendar;
yearSelect.onchange = renderCalendar;

/* =================== Calendar rendering =================== */
async function renderCalendar() {
  calendarEl.innerHTML = "";

  const month = Number(monthSelect.value);
  const year = Number(yearSelect.value);

  // build month range
  const from = `${year}-${String(month + 1).padStart(2, "0")}-01`;
  const to = `${year}-${String(month + 1).padStart(2, "0")}-31`;

  // fetch already-filtered trades
  const filteredTrades = await fetchFilteredTrades({
    account: accountSelect?.value,
    from,
    to
  });

  // normalize timestamps once
  filteredTrades.forEach(t => {
    t.entryDate = new Date(t.entryTimestamp);
  });

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startWeekday = (firstDay.getDay() + 6) % 7; // Mon = 0
  const daysInMonth = lastDay.getDate();

  /* ---------- headers ---------- */
  ["Mon","Tue","Wed","Thu","Fri"].forEach(d => {
    const h = document.createElement("div");
    h.className = "calendar-header";
    h.textContent = d;
    calendarEl.appendChild(h);
  });



  /* ---------- monthly aggregate ---------- */
  const monthlyTotal = { trades: 0, pnl: 0 };

  filteredTrades.forEach(t => {
    const d = t.entryDate;
    if (d.getMonth() === month && d.getFullYear() === year) {
      monthlyTotal.trades += 1;
      monthlyTotal.pnl += Number(t.pnl) || 0;
    }
  });

  /* ---------- empty cells before first weekday ---------- */
  const emptyCells = Math.min(startWeekday, 5);
  for (let i = 0; i < emptyCells; i++) {
    calendarEl.appendChild(document.createElement("div"));
  }

  /* ---------- days ---------- */
  for (let day = 1; day <= daysInMonth; day++) {
    const dateObj = new Date(year, month, day);
    const weekday = dateObj.getDay(); // 0 = Sun, 6 = Sat

    // skip weekends
    if (weekday === 0 || weekday === 6) continue;

    const cell = document.createElement("div");
    cell.className = "calendar-day";

    const isoDate = `${year}-${String(month + 1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    cell.dataset.date = isoDate;

    const dayTrades = filteredTrades.filter(t =>
      t.entryDate.getFullYear() === year &&
      t.entryDate.getMonth() === month &&
      t.entryDate.getDate() === day
    );

    const tradeCount = dayTrades.length;
    const dayPnL = dayTrades.reduce((s, t) => s + (Number(t.pnl) || 0), 0);

    // 👇 determine background class
    let pnlClass = "day-flat";
    if (tradeCount > 0) {
        pnlClass = dayPnL > 0 ? "day-positive" : dayPnL < 0 ? "day-negative" : "day-flat";
    }
    cell.className = `calendar-day ${pnlClass}`;
    cell.innerHTML = `
    <div class="calendar-date">${day}</div>
    <div class="calendar-trades">${tradeCount} trade${tradeCount !== 1 ? "s" : ""}</div>
    <div class="calendar-pnl ${dayPnL > 0 ? "positive" : dayPnL < 0 ? "negative" : ""}">
        ${tradeCount ? `${dayPnL > 0 ? "+" : ""}$${dayPnL.toFixed(2)}` : ""}
    </div>
    `;

    calendarEl.appendChild(cell);
  }

    // at the very end of renderCalendar()
    const monthTotalEl = document.getElementById("calendarMonthTotal");

    monthTotalEl.innerHTML = `
    <strong>Month total</strong>
    <span class="month-trades">${monthlyTotal.trades} trades</span>
    <span class="month-pnl ${monthlyTotal.pnl >= 0 ? "positive" : "negative"}">
        ${monthlyTotal.pnl >= 0 ? "+" : ""}$${monthlyTotal.pnl.toFixed(2)}
    </span>
    `;

}

/* =================== Click → journal filtered day =================== */
document.addEventListener("click", e => {
  const day = e.target.closest(".calendar-day");
  if (!day) return;

  const date = day.dataset.date;
  if (!date) return;

  window.location.href = `/journal?from=${date}&to=${date}`;
});
</script>

{% endblock %}
