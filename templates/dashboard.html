{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- ── HEADER ROW ── -->
<div style="display:flex; align-items:baseline; justify-content:space-between; max-width:1100px; margin-bottom:20px;">
  <h2 style="margin-bottom:0;">Dashboard</h2>
  <span id="lastUpdated" style="font-family:var(--font-mono); font-size:10px; color:var(--text-faint);"></span>
</div>

<!-- ── STAT PILLS ── -->
<div class="stat-pills" id="statPills"></div>

<!-- ── MAIN GRID: Calendar + Year heatmap ── -->
<div class="dash-main-grid">

  <!-- LEFT: Calendar -->
  <div class="dash-left">
    <div class="section-label">
      <div class="calendar-controls-modern" style="margin-bottom:12px;">
        <button id="prevMonth" class="cal-nav">◀</button>
        <div class="calendar-current"><span id="calendarLabel"></span></div>
        <button id="nextMonth" class="cal-nav">▶</button>
      </div>
    </div>
    <div class="calendar-wrapper" style="max-width:none; margin-bottom:0;">
      <div id="tradingCalendar" class="calendar-grid"></div>
      <div id="calendarMonthTotal" class="calendar-month-total"></div>
    </div>
  </div>

  <!-- RIGHT: Month stats + equity chart -->
  <div class="dash-right">

    <!-- Month vs Year equity curves -->
    <div class="dashboard-card" style="margin-bottom:14px;">
      <div class="card-header-row">
        <div class="card-label">Equity Curve</div>
        <div class="curve-toggle">
          <button class="curve-btn active" data-curve="month">Month</button>
          <button class="curve-btn" data-curve="year">Year</button>
        </div>
      </div>
      <canvas id="equityChart" style="width:100%;height:110px;display:block;"></canvas>
    </div>

    <!-- Two stat cards side by side -->
    <div style="display:flex; gap:12px;">
      <div id="monthlyStats" class="dashboard-card" style="flex:1;">
        <div class="stats-content"></div>
      </div>
      <div id="accountStats" class="dashboard-card" style="flex:1;">
        <div class="stats-content"></div>
      </div>
    </div>

  </div>
</div>

<!-- ── YEAR OVERVIEW HEATMAP ── -->
<div class="dashboard-card year-heatmap-card" style="margin-top:16px; max-width:1100px;">
  <div class="card-header-row">
    <div class="card-label">Year at a Glance — <span id="heatmapYear"></span></div>
    <div style="display:flex; gap:16px; font-size:11px; color:var(--text-muted); align-items:center;">
      <span style="display:flex; align-items:center; gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:rgba(52,195,143,0.8);display:inline-block;"></span>Profit</span>
      <span style="display:flex; align-items:center; gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:rgba(229,83,83,0.8);display:inline-block;"></span>Loss</span>
      <span style="display:flex; align-items:center; gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:var(--bg-elevated);border:1px solid var(--border-default);display:inline-block;"></span>No trades</span>
    </div>
  </div>
  <div id="yearHeatmap" class="year-heatmap-grid"></div>
</div>

<!-- ── BOTTOM ROW: Charts ── -->
<div class="dashboard-charts-row" style="margin-top:16px; max-width:1100px;">

  <div class="dashboard-card" style="flex:2;">
    <div class="card-label">PnL by Hour (Full Account)</div>
    <canvas id="hourScatterChart" height="130"></canvas>
  </div>

  <div class="dashboard-card" style="flex:1.4;">
    <div class="card-label">Win Rate by Day</div>
    <canvas id="dowChart" height="130"></canvas>
  </div>

  <div class="dashboard-card" style="flex:1.4;">
    <div class="card-label">Trade Duration</div>
    <div id="durationStats" class="duration-stats"></div>
  </div>

</div>


<script>
let isRendering = false;
let pendingRender = false;

const accountSelect = document.getElementById("accountSelect");
if (accountSelect) accountSelect.addEventListener("change", renderCalendar);

const calendarEl = document.getElementById("tradingCalendar");

const MONTHS = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
];
const MONTHS_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let currentDate = new Date();
const calendarLabel = document.getElementById("calendarLabel");

function updateCalendarLabel() {
  calendarLabel.textContent = `${MONTHS[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
}

document.getElementById("prevMonth").onclick = () => {
  currentDate.setMonth(currentDate.getMonth() - 1);
  updateCalendarLabel();
  renderCalendar();
};

document.getElementById("nextMonth").onclick = () => {
  currentDate.setMonth(currentDate.getMonth() + 1);
  updateCalendarLabel();
  renderCalendar();
};

updateCalendarLabel();

/* ── last updated ── */
document.getElementById("lastUpdated").textContent =
  `Updated ${new Date().toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" })}`;

/* ===================== RENDER CALENDAR ===================== */

async function renderCalendar() {
  if (isRendering) { pendingRender = true; return; }
  isRendering = true;
  pendingRender = false;

  calendarEl.innerHTML = "";

  const month = currentDate.getMonth();
  const year  = currentDate.getFullYear();

  const from = new Date(year, month, 1).toISOString().slice(0,10);
  const to   = new Date(year, month + 1, 0).toISOString().slice(0,10);

  let monthlyTrades = await fetchFilteredTrades({ account: accountSelect?.value, from, to }) || [];
  let accountTrades = await fetchFilteredTrades({ account: accountSelect?.value }) || [];

  monthlyTrades = monthlyTrades.map(t => ({ ...t, entryDate: new Date(t.entryTimestamp) }));
  accountTrades = accountTrades.map(t => ({ ...t, entryDate: new Date(t.entryTimestamp) }));

  renderDashboardStats(monthlyTrades, accountTrades, month, year);
  renderYearHeatmap(accountTrades, year);

  const firstDay     = new Date(year, month, 1);
  const lastDay      = new Date(year, month + 1, 0);
  const startWeekday = (firstDay.getDay() + 6) % 7;
  const daysInMonth  = lastDay.getDate();

  ["Mon","Tue","Wed","Thu","Fri"].forEach(d => {
    const h = document.createElement("div");
    h.className = "calendar-header";
    h.textContent = d;
    calendarEl.appendChild(h);
  });

  for (let i = 0; i < Math.min(startWeekday, 5); i++)
    calendarEl.appendChild(document.createElement("div"));

  const monthlyTotal = { trades: 0, pnl: 0 };

  for (let day = 1; day <= daysInMonth; day++) {
    const dateObj = new Date(year, month, day);
    if (dateObj.getDay() === 0 || dateObj.getDay() === 6) continue;

    const isoDate   = dateObj.toISOString().slice(0,10);
    const dayTrades = monthlyTrades.filter(t => t.entryDate.toISOString().slice(0,10) === isoDate);
    const tradeCount = dayTrades.length;
    const dayPnL     = dayTrades.reduce((s,t) => s + (Number(t.pnl)||0), 0);

    monthlyTotal.trades += tradeCount;
    monthlyTotal.pnl    += dayPnL;

    const pnlClass = tradeCount === 0 ? "day-flat" : dayPnL > 0 ? "day-positive" : dayPnL < 0 ? "day-negative" : "day-flat";

    const cell = document.createElement("div");
    cell.className = `calendar-day ${pnlClass}`;
    cell.dataset.date = isoDate;
    cell.innerHTML = `
      <div class="calendar-date">${day}</div>
      <div class="calendar-trades">${tradeCount} trade${tradeCount!==1?"s":""}</div>
      <div class="calendar-pnl ${dayPnL>0?"positive":dayPnL<0?"negative":""}">
        ${tradeCount ? `${dayPnL>=0?"+":""}$${dayPnL.toFixed(2)}` : ""}
      </div>`;
    calendarEl.appendChild(cell);
  }

  document.getElementById("calendarMonthTotal").innerHTML = `
    <strong>Month total</strong>
    <span>${monthlyTotal.trades} trades</span>
    <span class="${monthlyTotal.pnl>=0?"positive":"negative"}" style="font-family:var(--font-mono)">
      ${monthlyTotal.pnl>=0?"+":""}$${monthlyTotal.pnl.toFixed(2)}
    </span>`;

  isRendering = false;
  if (pendingRender) renderCalendar();
}

/* ===================== YEAR HEATMAP ===================== */

function renderYearHeatmap(allTrades, year) {
  document.getElementById("heatmapYear").textContent = year;

  const dailyPnL = {};
  allTrades.forEach(t => {
    const d = new Date(t.entryDate).toISOString().slice(0,10);
    dailyPnL[d] = (dailyPnL[d] || 0) + (Number(t.pnl) || 0);
  });

  /* find max abs pnl for scaling intensity */
  const values = Object.values(dailyPnL).map(Math.abs);
  const maxPnL = values.length ? Math.max(...values) : 1;

  const today = new Date();
  const grid  = document.getElementById("yearHeatmap");
  grid.innerHTML = "";

  for (let m = 0; m < 12; m++) {
    const col = document.createElement("div");
    col.className = "heatmap-month";

    const label = document.createElement("div");
    label.className = "heatmap-month-label";
    label.textContent = MONTHS_SHORT[m];
    col.appendChild(label);

    const daysDiv = document.createElement("div");
    daysDiv.className = "heatmap-days";

    let monthPnL = 0;
    const daysInMonth = new Date(year, m + 1, 0).getDate();

    for (let d = 1; d <= daysInMonth; d++) {
      const dateObj = new Date(year, m, d);
      const dow     = dateObj.getDay();
      if (dow === 0 || dow === 6) continue; /* skip weekends */

      const iso  = dateObj.toISOString().slice(0,10);
      const pnl  = dailyPnL[iso];
      const cell = document.createElement("div");

      if (dateObj > today) {
        cell.className = "heatmap-cell future";
      } else if (pnl === undefined) {
        cell.className = "heatmap-cell no-trade";
        cell.title = iso;
      } else {
        monthPnL += pnl;
        const intensity = Math.min(Math.ceil(Math.abs(pnl) / maxPnL * 3), 3);
        cell.className  = `heatmap-cell ${pnl >= 0 ? "pos" : "neg"}-${intensity}`;
        cell.title      = `${iso}: ${pnl >= 0 ? "+" : ""}$${pnl.toFixed(2)}`;
        cell.style.cursor = "pointer";
        cell.addEventListener("click", () => {
          window.location.href = `/journal?from=${iso}&to=${iso}`;
        });
      }

      daysDiv.appendChild(cell);
    }

    col.appendChild(daysDiv);

    /* month bar + pnl total */
    const bar = document.createElement("div");
    bar.className = "heatmap-month-bar";
    bar.style.background = monthPnL > 0
      ? `rgba(52,195,143,${Math.min(0.3 + Math.abs(monthPnL)/maxPnL*0.7, 1)})`
      : monthPnL < 0
        ? `rgba(229,83,83,${Math.min(0.3 + Math.abs(monthPnL)/maxPnL*0.7, 1)})`
        : "var(--border-default)";
    col.appendChild(bar);

    const pnlLabel = document.createElement("div");
    pnlLabel.className = `heatmap-month-pnl ${monthPnL > 0 ? "pos" : monthPnL < 0 ? "neg" : "flat"}`;
    pnlLabel.textContent = monthPnL !== 0
      ? `${monthPnL >= 0 ? "+" : ""}$${Math.abs(monthPnL) >= 1000
          ? (monthPnL/1000).toFixed(1)+"k"
          : monthPnL.toFixed(0)}`
      : "—";
    col.appendChild(pnlLabel);

    grid.appendChild(col);
  }
}

/* ===================== CHART INSTANCES ===================== */

let equityRedrawPending = false;
let hourScatterInstance  = null;
let dowChartInstance     = null;

let monthlyEquityData = null;
let yearEquityData    = null;
let activeCurve       = "month";

/* ── curve toggle ── */
document.querySelectorAll(".curve-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".curve-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeCurve = btn.dataset.curve;
    drawEquityChart(activeCurve);
  });
});

function drawEquityChart(mode) {
  const d = mode === "month" ? monthlyEquityData : yearEquityData;
  const canvas = document.getElementById("equityChart");
  if (!d || !d.data.length) { canvas.getContext("2d").clearRect(0,0,canvas.width,canvas.height); return; }

  const color  = mode === "month" ? "#5b8ef5" : "#34c38f";
  const gradRgb = mode === "month" ? "91,142,245" : "52,195,143";
  const title  = mode === "month"
    ? `${MONTHS[currentDate.getMonth()].toUpperCase()} ${currentDate.getFullYear()}`
    : `${currentDate.getFullYear()}`;

  const dpr = window.devicePixelRatio || 1;
  const W   = canvas.parentElement.offsetWidth || 400;
  const H   = 110;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + "px";
  canvas.style.height = H + "px";

  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  /* watermark */
  ctx.save();
  ctx.font = "700 24px 'DM Sans', sans-serif";
  ctx.fillStyle = "rgba(255,255,255,0.045)";
  ctx.fillText(title, 8, 26);
  ctx.restore();

  /* y-axis ticks on right */
  const vals = d.data;
  const minV = Math.min(...vals);
  const maxV = Math.max(...vals);
  const range = maxV - minV || 1;
  const pad = { top: 10, bottom: 6, left: 4, right: 42 };

  const toX = i => pad.left + (i / (vals.length - 1)) * (W - pad.left - pad.right);
  const toY = v => pad.top + (1 - (v - minV) / range) * (H - pad.top - pad.bottom);

  /* y tick labels */
  ctx.save();
  ctx.font = `10px 'IBM Plex Mono', monospace`;
  ctx.fillStyle = "#3a4050";
  ctx.textAlign = "right";
  [minV, (minV+maxV)/2, maxV].forEach(v => {
    const y = toY(v);
    ctx.fillText(`$${Math.round(v)}`, W - 2, y + 3);
    ctx.strokeStyle = "rgba(255,255,255,0.03)";
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(W - pad.right, y);
    ctx.stroke();
  });
  ctx.restore();

  /* gradient fill — all the way to bottom of canvas */
  const grad = ctx.createLinearGradient(0, pad.top, 0, H);
  grad.addColorStop(0,   `rgba(${gradRgb},0.22)`);
  grad.addColorStop(1,   `rgba(${gradRgb},0)`);

  ctx.beginPath();
  ctx.moveTo(toX(0), toY(vals[0]));
  for (let i = 1; i < vals.length; i++) {
    const cpx = (toX(i-1) + toX(i)) / 2;
    ctx.bezierCurveTo(cpx, toY(vals[i-1]), cpx, toY(vals[i]), toX(i), toY(vals[i]));
  }
  ctx.lineTo(toX(vals.length - 1), H);
  ctx.lineTo(toX(0), H);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  /* line */
  ctx.beginPath();
  ctx.moveTo(toX(0), toY(vals[0]));
  for (let i = 1; i < vals.length; i++) {
    const cpx = (toX(i-1) + toX(i)) / 2;
    ctx.bezierCurveTo(cpx, toY(vals[i-1]), cpx, toY(vals[i]), toX(i), toY(vals[i]));
  }
  ctx.strokeStyle = color;
  ctx.lineWidth   = 2;
  ctx.lineJoin    = "round";
  ctx.stroke();
}

/* ===================== DASHBOARD STATS ===================== */

function renderDashboardStats(monthlyTrades, accountTrades, month, year) {

  function buildDailyEquity(trades) {
    const grouped = {};
    trades.forEach(t => {
      const d = new Date(t.entryDate).toISOString().slice(0,10);
      grouped[d] = (grouped[d] || 0) + (Number(t.pnl) || 0);
    });
    const keys = Object.keys(grouped).sort((a,b) => new Date(a)-new Date(b));
    let cum = 0;
    const labels = [], data = [];
    keys.forEach(k => { cum += grouped[k]; labels.push(k); data.push(+cum.toFixed(2)); });
    return { labels, data };
  }

  function buildYearEquity(trades, year) {
    const grouped = {};
    trades.forEach(t => {
      const d = new Date(t.entryDate);
      if (d.getFullYear() !== year) return;
      const key = d.toISOString().slice(0,10);
      grouped[key] = (grouped[key] || 0) + (Number(t.pnl) || 0);
    });
    const keys = Object.keys(grouped).sort((a,b) => new Date(a)-new Date(b));
    let cum = 0;
    const labels = [], data = [];
    keys.forEach(k => { cum += grouped[k]; labels.push(k); data.push(+cum.toFixed(2)); });
    return { labels, data };
  }

  function computeStats(trades) {
    const pnl    = trades.reduce((s,t) => s + (Number(t.pnl)||0), 0);
    const wins   = trades.filter(t => Number(t.pnl) > 0);
    const losses = trades.filter(t => Number(t.pnl) < 0);
    const avgWin  = wins.length   ? wins.reduce((s,t)=>s+Number(t.pnl),0)/wins.length   : 0;
    const avgLoss = losses.length ? losses.reduce((s,t)=>s+Number(t.pnl),0)/losses.length : 0;
    const winRate = trades.length ? (wins.length / trades.length * 100).toFixed(1) : 0;
    const grossWin  = wins.reduce((s,t)=>s+Number(t.pnl),0);
    const grossLoss = Math.abs(losses.reduce((s,t)=>s+Number(t.pnl),0));
    const profitFactor = grossLoss > 0 ? (grossWin / grossLoss).toFixed(2) : "∞";
    return { pnl, wins, losses, avgWin, avgLoss, winRate, profitFactor };
  }

  function maxDrawdown(equity) {
    let peak = -Infinity, maxDD = 0;
    equity.forEach(v => {
      if (v > peak) peak = v;
      const dd = peak - v;
      if (dd > maxDD) maxDD = dd;
    });
    return maxDD;
  }

  function streaks(trades) {
    const days = {};
    trades.forEach(t => {
      const d = new Date(t.entryDate).toISOString().slice(0,10);
      days[d] = (days[d] || 0) + (Number(t.pnl)||0);
    });
    const sorted = Object.values(days).map(Number);
    let best = 0, worst = 0, cur = 0;
    sorted.forEach(v => { cur = v > 0 ? cur+1 : (v<0?0:cur); if(cur>best) best=cur; });
    cur = 0;
    sorted.forEach(v => { cur = v < 0 ? cur+1 : (v>0?0:cur); if(cur>worst) worst=cur; });
    return { best, worst };
  }

  function durationStats(trades) {
    const withDur = trades.filter(t => t.exitTimestamp && t.entryTimestamp);
    if (!withDur.length) return null;
    const mins = withDur.map(t => (new Date(t.exitTimestamp) - new Date(t.entryTimestamp)) / 60000);
    const avg  = mins.reduce((a,b)=>a+b,0) / mins.length;
    const fmt  = m => m < 60 ? `${Math.round(m)}m` : `${Math.floor(m/60)}h ${Math.round(m%60)}m`;
    return { avg: fmt(avg), min: fmt(Math.min(...mins)), max: fmt(Math.max(...mins)), count: withDur.length };
  }

  function hourPnLScatter(trades) {
    return trades.map(t => {
      const d = new Date(t.entryTimestamp);
      const x = d.getHours() + Math.floor(d.getMinutes() / 15) * 0.25;
      return { x, y: Number(t.pnl)||0 };
    });
  }

  function scatterXRange(points) {
    if (!points.length) return { min: 8, max: 17 };
    const xs = points.map(p => p.x);
    return { min: Math.floor(Math.min(...xs)), max: Math.ceil(Math.max(...xs)) };
  }

  function dowWinRate(trades) {
    const days = ["Mon","Tue","Wed","Thu","Fri"];
    const buckets = days.map(() => ({ wins: 0, total: 0 }));
    trades.forEach(t => {
      const d = (new Date(t.entryTimestamp).getDay() + 6) % 7;
      if (d > 4) return;
      buckets[d].total++;
      if (Number(t.pnl) > 0) buckets[d].wins++;
    });
    return {
      labels: days,
      data:   buckets.map(b => b.total ? +(b.wins/b.total*100).toFixed(1) : 0),
      counts: buckets.map(b => b.total)
    };
  }

  /* ── year trades ── */
  const yearTrades = accountTrades.filter(t => new Date(t.entryTimestamp).getFullYear() === year);

  /* ── compute ── */
  monthlyEquityData = buildDailyEquity(monthlyTrades);
  yearEquityData    = buildYearEquity(accountTrades, year);

  const accountEquity = buildDailyEquity(accountTrades);
  const m   = computeStats(monthlyTrades);
  const a   = computeStats(accountTrades);
  const y   = computeStats(yearTrades);
  const dd  = maxDrawdown(accountEquity.data);
  const st  = streaks(accountTrades);
  const dur = durationStats(accountTrades);
  const scatter = hourPnLScatter(accountTrades);
  const dw  = dowWinRate(accountTrades);

  /* ── equity chart ── */
  drawEquityChart(activeCurve);

  /* ── stat pills — all-time first, then year-level metrics ── */
  const allTimeFmt = Math.abs(a.pnl)>=1000?(a.pnl/1000).toFixed(1)+"k":a.pnl.toFixed(0);
  document.getElementById("statPills").innerHTML = `
    <div class="stat-pill">
      <div class="stat-pill-label">All-time PnL</div>
      <div class="stat-pill-value ${a.pnl>=0?"positive":"negative"}">${a.pnl>=0?"+":""}$${allTimeFmt}</div>
    </div>
    <div style="width:1px;background:var(--border-default);align-self:stretch;margin:0 2px;flex-shrink:0;"></div>
    <div class="stat-pill">
      <div class="stat-pill-label">Year PnL</div>
      <div class="stat-pill-value ${y.pnl>=0?"positive":"negative"}">${y.pnl>=0?"+":""}$${Math.abs(y.pnl)>=1000?(y.pnl/1000).toFixed(1)+"k":y.pnl.toFixed(0)}</div>
    </div>
    <div class="stat-pill">
      <div class="stat-pill-label">Year trades</div>
      <div class="stat-pill-value neutral">${yearTrades.length}</div>
    </div>
    <div class="stat-pill">
      <div class="stat-pill-label">Year win rate</div>
      <div class="stat-pill-value neutral">${y.winRate}%</div>
    </div>
    <div class="stat-pill">
      <div class="stat-pill-label">Best streak</div>
      <div class="stat-pill-value positive">${st.best}d</div>
    </div>
    <div class="stat-pill">
      <div class="stat-pill-label">Worst streak</div>
      <div class="stat-pill-value negative">${st.worst}d</div>
    </div>
    <div class="stat-pill">
      <div class="stat-pill-label">Max drawdown</div>
      <div class="stat-pill-value negative">-$${dd.toFixed(0)}</div>
    </div>
    <div class="stat-pill">
      <div class="stat-pill-label">
        Profit factor
        <span class="pill-info-anchor">
          <span class="pill-info-icon">i</span>
          <span class="pill-info-tooltip">
            Total $ won on winning trades ÷ total $ lost on losing trades.<br><br>
            <strong>Above 1.0</strong> → you make more than you lose overall.<br>
            <strong>Above 1.5</strong> → solid edge.<br>
            <strong>Below 1.0</strong> → losing strategy overall.
          </span>
        </span>
      </div>
      <div class="stat-pill-value neutral">${a.profitFactor}</div>
    </div>`;

  /* ── stats cards ── */
  document.querySelector("#monthlyStats .stats-content").innerHTML = `
    <h4>${MONTHS[month]} ${year}</h4>
    <div><span>Trades</span>       <strong>${monthlyTrades.length}</strong></div>
    <div><span>PnL</span>          <strong class="${m.pnl>=0?"positive":"negative"}" style="font-family:var(--font-mono)">${m.pnl>=0?"+":""}$${m.pnl.toFixed(2)}</strong></div>
    <div><span>Win rate</span>     <strong>${m.winRate}%</strong></div>
    <div><span>Avg win</span>      <strong class="positive" style="font-family:var(--font-mono)">+$${m.avgWin.toFixed(2)}</strong></div>
    <div><span>Avg loss</span>     <strong class="negative" style="font-family:var(--font-mono)">$${m.avgLoss.toFixed(2)}</strong></div>
    <div><span>Profit factor</span><strong style="color:var(--accent-blue)">${m.profitFactor}</strong></div>`;

  document.querySelector("#accountStats .stats-content").innerHTML = `
    <h4>Full Account</h4>
    <div><span>Trades</span>       <strong>${accountTrades.length}</strong></div>
    <div><span>PnL</span>          <strong class="${a.pnl>=0?"positive":"negative"}" style="font-family:var(--font-mono)">${a.pnl>=0?"+":""}$${a.pnl.toFixed(2)}</strong></div>
    <div><span>Win rate</span>     <strong>${a.winRate}%</strong></div>
    <div><span>Avg win</span>      <strong class="positive" style="font-family:var(--font-mono)">+$${a.avgWin.toFixed(2)}</strong></div>
    <div><span>Avg loss</span>     <strong class="negative" style="font-family:var(--font-mono)">$${a.avgLoss.toFixed(2)}</strong></div>
    <div><span>Profit factor</span><strong style="color:var(--accent-blue)">${a.profitFactor}</strong></div>`;

  /* ── hour scatter ── */
  const xRange = scatterXRange(scatter);
  if (hourScatterInstance) hourScatterInstance.destroy();
  hourScatterInstance = new Chart(document.getElementById("hourScatterChart"), {
    type: "scatter",
    data: {
      datasets: [{
        data: scatter,
        backgroundColor: scatter.map(p => p.y >= 0 ? "rgba(52,195,143,0.55)" : "rgba(229,83,83,0.55)"),
        borderColor:     scatter.map(p => p.y >= 0 ? "rgba(52,195,143,0.8)"  : "rgba(229,83,83,0.8)"),
        borderWidth: 1,
        pointRadius: 4,
        pointHoverRadius: 6
      }]
    },
    options: {
      responsive: true,
      animation: { duration: 800 },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const h  = Math.floor(ctx.raw.x);
              const m  = Math.round((ctx.raw.x - h) * 60);
              const ts = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
              return ` ${ts} → $${ctx.raw.y.toFixed(2)}`;
            }
          }
        }
      },
      scales: {
        x: {
          min: xRange.min,
          max: xRange.max,
          ticks: {
            color: "#5a6070",
            font: { size: 10, family: "'IBM Plex Mono'" },
            stepSize: 0.25,
            callback: v => {
              const h = Math.floor(v);
              const m = Math.round((v - h) * 60);
              if (m === 0)  return `${String(h).padStart(2,'0')}:00`;
              if (m === 30) return `${String(h).padStart(2,'0')}:30`;
              return '';
            }
          },
          grid: { color: "rgba(255,255,255,0.04)" }
        },
        y: {
          ticks: { color: "#5a6070", font: { size: 10, family: "'IBM Plex Mono'" }, callback: v => `$${v}` },
          grid: { color: "rgba(255,255,255,0.04)" }
        }
      }
    }
  });

  /* ── day of week ── */
  if (dowChartInstance) dowChartInstance.destroy();
  dowChartInstance = new Chart(document.getElementById("dowChart"), {
    type: "bar",
    data: {
      labels: dw.labels,
      datasets: [{
        data: dw.data,
        backgroundColor: dw.data.map(v => v>=60?"rgba(52,195,143,0.75)":v>=40?"rgba(91,142,245,0.75)":"rgba(229,83,83,0.65)"),
        borderRadius: 4,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true,
      animation: { duration: 800 },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.raw}% win rate (${dw.counts[ctx.dataIndex]} trades)` } }
      },
      scales: {
        x: { ticks: { color: "#5a6070", font: { size: 11 } }, grid: { display: false } },
        y: { min: 0, max: 100, ticks: { color: "#5a6070", font: { size: 10 }, callback: v => `${v}%` }, grid: { color: "rgba(255,255,255,0.04)" } }
      }
    }
  });

  /* ── duration ── */
  const durationEl = document.getElementById("durationStats");
  if (dur) {
    durationEl.innerHTML = `
      <div class="dur-row"><span>Avg hold</span>  <span class="dur-val">${dur.avg}</span></div>
      <div class="dur-row"><span>Shortest</span>  <span class="dur-val">${dur.min}</span></div>
      <div class="dur-row"><span>Longest</span>   <span class="dur-val">${dur.max}</span></div>
      <div class="dur-row"><span>Tracked</span>   <span class="dur-val">${dur.count} trades</span></div>`;
  } else {
    durationEl.innerHTML = `<div style="color:var(--text-faint);font-size:12px;margin-top:10px;">No exit timestamps found.</div>`;
  }
}

/* ===================== CLICK DAY ===================== */

document.addEventListener("click", e => {
  const day = e.target.closest(".calendar-day");
  if (!day) return;
  const date = day.dataset.date;
  if (!date) return;
  window.location.href = `/journal?from=${date}&to=${date}`;
});

function waitForAccount() {
  return new Promise(resolve => {
    if (window.accountSelectorReady) return resolve();
    document.addEventListener("accountReady", resolve, { once: true });
  });
}

waitForAccount().then(() => renderCalendar());
</script>

{% endblock %}
