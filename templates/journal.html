{% extends "base.html" %}
{% block title %}Journal{% endblock %}
{% block content %}

<h2>Trade Journal</h2>

<!-- ================= CONTROLS ================= -->
<div class="journal-controls">
  <div class="journal-controls-left">
    <div class="date-group">
      <label class="date-label">From
        <input type="date" id="dateFrom" class="dark-input">
      </label>
      <label class="date-label">To
        <input type="date" id="dateTo" class="dark-input">
      </label>
      <button onclick="applyFiltersAndRender()">Apply</button>
      <button onclick="resetFilters()">Reset</button>
    </div>
  </div>
  <div class="journal-controls-right">
    <button class="btn-danger" onclick="deleteSelected()">Delete selected</button>
  </div>
</div>

<!-- Strategy and setup filters -->
<div id="strategySetup">
  <div class="filter-group">
    <span class="filter-group-label">Strategies</span>
    <div id="strategyFilter" class="filter-buttons single"></div>
  </div>
  <div class="filter-group">
    <span class="filter-group-label">Setups</span>
    <div id="setupFilter" class="filter-buttons multi"></div>
  </div>
</div>

<!-- Table + Chart column -->
<div style="display:flex; gap:20px; align-items:flex-start;">

  <div style="flex:2;">
    <table id="tradeTable">
      <thead><tr id="headerRow"></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div style="flex:1; display:flex; flex-direction:column; gap:20px;">
    <div style="height:220px;">
      <canvas id="pnlChart"></canvas>
    </div>
    <div id="journalStats" class="journal-stats"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let originalData = [];
let charts = {};
let openRow = null;
let STRATEGIES = [];
let SETUPS = [];
let EMOTIONS = [];
let dataReady = false;

function renderJournalStats(data) {
  const statsEl = document.getElementById("journalStats");
  if (!statsEl) return;
  const totalTrades = data.length;
  const longs  = data.filter(t => String(t.side).toLowerCase() === "long");
  const shorts = data.filter(t => String(t.side).toLowerCase() === "short");
  const longPnL  = longs.reduce((s,t)  => s + (Number(t.pnl)||0), 0);
  const shortPnL = shorts.reduce((s,t) => s + (Number(t.pnl)||0), 0);
  const wins    = data.filter(t => Number(t.pnl) > 0).length;
  const winRate = totalTrades ? ((wins/totalTrades)*100).toFixed(1) : 0;
  statsEl.innerHTML = `
    <div class="stat-block"><span class="stat-block-label">Total trades</span><span class="stat-block-val">${totalTrades}</span></div>
    <div class="stat-block"><span class="stat-block-label">Longs</span><span class="stat-block-val">${longs.length} — <span class="${longPnL>=0?"positive":"negative"}">${longPnL>=0?"+":""}$${longPnL.toFixed(2)}</span></span></div>
    <div class="stat-block"><span class="stat-block-label">Shorts</span><span class="stat-block-val">${shorts.length} — <span class="${shortPnL>=0?"positive":"negative"}">${shortPnL>=0?"+":""}$${shortPnL.toFixed(2)}</span></span></div>
    <div class="stat-block"><span class="stat-block-label">Win rate</span><span class="stat-block-val">${winRate}%</span></div>`;
}

const COLUMN_ORDER = ["select","symbol","entryTimestamp","exitTimestamp","duration","side","qty","entryPrice","exitPrice","pnl"];
const COLUMN_NAMES = { select:"", symbol:"Symbol", entryTimestamp:"Entry Time", exitTimestamp:"Exit Time", duration:"Duration", side:"Side", qty:"Qty", entryPrice:"Entry Price", exitPrice:"Exit Price", pnl:"PnL" };
const pad = n => String(n).padStart(2,"0");
const formatDate = d => `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
const formatTime = d => `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
const formatPnL  = v => { const n=Number(v)||0; const f=Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2}); return n<0?`($${f})`:`$${f}`; };

function waitForAccount() {
  return new Promise(resolve => {
    if (window.accountSelectorReady) return resolve();
    document.addEventListener("accountReady", resolve, { once: true });
  });
}

Promise.all([
  fetch("/api/strategies").then(r=>r.json()),
  fetch("/api/setups").then(r=>r.json()),
  fetch("/api/trade_setups").then(r=>r.json()),
  fetch("/api/emotions").then(r=>r.json()).catch(()=>[]),
  fetch("/api/emotions_trades").then(r=>r.json()).catch(()=>[]),
]).then(async ([strategies, setups, tradeSetups, emotions, emotionTrades]) => {
  await waitForAccount();
  STRATEGIES = strategies;
  SETUPS     = setups;
  EMOTIONS   = emotions;

  const setupContainer = document.getElementById("setupFilter");
  setupContainer.innerHTML = "";
  SETUPS.forEach(s => {
    const btn = document.createElement("button");
    btn.textContent = s.setup_name;
    btn.dataset.id = s.id;
    btn.style.background = s.color;
    btn.onclick = () => { btn.classList.toggle("active"); applyFiltersAndRender(); };
    setupContainer.appendChild(btn);
  });

  const strategyContainer = document.getElementById("strategyFilter");
  strategyContainer.innerHTML = "";
  STRATEGIES.forEach(s => {
    const btn = document.createElement("button");
    btn.textContent = s.strategy_name;
    btn.dataset.id = s.id;
    btn.style.background = s.color;
    btn.onclick = () => {
      const isActive = btn.classList.contains("active");
      strategyContainer.querySelectorAll("button").forEach(b => b.classList.remove("active"));
      if (!isActive) btn.classList.add("active");
      applyFiltersAndRender();
    };
    strategyContainer.appendChild(btn);
  });

  const trades = await fetchFilteredTrades({ account: accountSelect?.value });
  originalData = trades.map(t => ({
    ...t,
    entryTimestamp: new Date(t.entryTimestamp),
    exitTimestamp:  new Date(t.exitTimestamp),
    setups:   tradeSetups.filter(ts=>ts.key_trade_id===t.id).map(ts=>ts.key_setup_id),
    emotions: emotionTrades.filter(et=>et.trade_id===t.id).map(et=>et.emotions_id)
  }));

  buildHeaders();
  dataReady = true;
  applyFiltersAndRender();
}).catch(err => {
  console.error("Journal init failed:", err);
});

function resetFilters() {
  document.getElementById("dateFrom").value = "";
  document.getElementById("dateTo").value = "";
  document.querySelectorAll(".filter-buttons button").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll("th input[data-col]").forEach(i=>i.value="");
  window.history.replaceState({}, "", "/journal");
  applyFiltersAndRender();
}

async function deleteSelected() {
  const checked = [...document.querySelectorAll(".row-select:checked")];
  if (!checked.length) { alert("No trades selected."); return; }
  if (!confirm(`Delete ${checked.length} trade(s)?`)) return;
  const ids = checked.map(cb=>Number(cb.dataset.id));
  const res = await fetch("/api/trades", { method:"DELETE", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ids}) });
  if (res.ok) { originalData = originalData.filter(t=>!ids.includes(t.id)); applyFiltersAndRender(); }
  else alert("Delete failed.");
}

function buildHeaders() {
  const tr = document.getElementById("headerRow"); tr.innerHTML="";
  COLUMN_ORDER.forEach(col => {
    const th = document.createElement("th");
    if (col==="select") {
      const cb=document.createElement("input"); cb.type="checkbox";
      cb.onclick=e=>document.querySelectorAll(".row-select").forEach(x=>x.checked=e.target.checked);
      th.appendChild(cb);
    } else {
      th.textContent = COLUMN_NAMES[col]??col;
      const input=document.createElement("input"); input.placeholder="Filter"; input.dataset.col=col; input.onkeyup=applyFiltersAndRender;
      th.append(document.createElement("br"), input);
    }
    tr.appendChild(th);
  });
}

function buildRows(data) {
  const tbody=document.querySelector("#tradeTable tbody"); tbody.innerHTML="";
  data.forEach(row => {
    const tr=document.createElement("tr"); tr.className="trade-row"; tr.onclick=()=>toggleTradeDetails(tr,row);
    COLUMN_ORDER.forEach(col => {
      const td=document.createElement("td");
      if (col==="select") { const cb=document.createElement("input"); cb.type="checkbox"; cb.className="row-select"; cb.dataset.id=row.id; cb.addEventListener("click",e=>e.stopPropagation()); td.appendChild(cb); }
      else if (col==="pnl") { const v=Number(row[col])||0; td.textContent=formatPnL(v); td.className=v>=0?"pnl-positive":"pnl-negative"; }
      else if (col==="side") { td.textContent=row[col]??""; td.className=`side-${String(row[col]).toLowerCase()}`; }
      else if (col.includes("Timestamp")) td.textContent=formatDate(row[col]);
      else td.textContent=row[col]??"";
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function renderStrategyTag(strategyId) {
  if (!strategyId) return `<span class="strategy-tag muted" data-remove-strategy>None ×</span>`;
  const s=STRATEGIES.find(x=>x.id===strategyId); if(!s) return "";
  return `<span class="strategy-tag" style="background:${s.color}" data-remove-strategy>${s.strategy_name} ×</span>`;
}

function renderSetupTags(trade) {
  if (!trade.setups?.length) return `<span class="setup-tag muted">No setup</span>`;
  return trade.setups.map(id => {
    const s=SETUPS.find(x=>x.id==id); if(!s) return "";
    return `<span class="setup-tag" style="background:${s.color};">${s.setup_name}<span class="tag-remove" onclick="removeSetup(event,${trade.id},${id})">×</span></span>`;
  }).join("");
}

function renderEmotionTags(trade) {
  if (!trade.emotions?.length) return `<span class="setup-tag muted">None</span>`;
  return trade.emotions.map(id => {
    const e=EMOTIONS.find(x=>x.id==id); if(!e) return "";
    return `<span class="setup-tag" style="background:${e.color||"#3a4050"};">${e.emotion}<span class="tag-remove" onclick="removeEmotion(event,${trade.id},${id})">×</span></span>`;
  }).join("");
}

function removeSetup(e, tradeId, setupId) {
  e.stopPropagation();
  fetch("/api/trade_setups", { method:"DELETE", headers:{"Content-Type":"application/json"}, body:JSON.stringify({trade_id:tradeId, setup_id:setupId}) })
  .then(() => {
    const trade=originalData.find(t=>t.id===tradeId);
    trade.setups=trade.setups.filter(id=>id!==setupId);
    const container = openRow?.panel?.querySelectorAll(".td-col")?.[1]?.querySelector(".setup-tag-container");
    if (container) container.innerHTML=renderSetupTags(trade);
  });
}

function removeEmotion(e, tradeId, emotionId) {
  e.stopPropagation();
  fetch("/api/emotions_trades", { method:"DELETE", headers:{"Content-Type":"application/json"}, body:JSON.stringify({trade_id:tradeId, emotions_id:emotionId}) })
  .then(() => {
    const trade=originalData.find(t=>t.id===tradeId);
    trade.emotions=trade.emotions.filter(id=>id!==emotionId);
    const container=openRow?.panel?.querySelector(".emotion-tag-container");
    if (container) container.innerHTML=renderEmotionTags(trade);
  });
}

/* ── DETAIL PANEL ── */
function toggleTradeDetails(tr, trade) {
  if (openRow && openRow.tr===tr) { closeDetails(); return; }
  closeDetails();
  tr.classList.add("expanded");

  const strategyOptions = [`<option value="">No strategy</option>`, ...STRATEGIES.map(s=>`<option value="${s.id}" ${s.id===trade.key_strategies_id?"selected":""}>${s.strategy_name}</option>`)].join("");

  const detailsTr=document.createElement("tr"); detailsTr.className="trade-details-row";
  const td=document.createElement("td"); td.colSpan=COLUMN_ORDER.length;

  td.innerHTML=`
    <div class="trade-details">
      <div class="td-grid">

        <!-- COL 1: Trade info + notes -->
        <div class="td-col">
          <div class="td-section-label">Trade details</div>
          <div class="td-info-grid">
            <span class="td-label">Entry</span>     <span class="td-val">${formatTime(trade.entryTimestamp)}</span>
            <span class="td-label">Exit</span>      <span class="td-val">${formatTime(trade.exitTimestamp)}</span>
            <span class="td-label">Duration</span>  <span class="td-val">${(()=>{ const s=Math.round((trade.exitTimestamp-trade.entryTimestamp)/1000); const h=Math.floor(s/3600); const m=Math.floor((s%3600)/60); const sc=s%60; return `${pad(h)}:${pad(m)}:${pad(sc)}`; })()}</span>
            <span class="td-label">PnL</span>       <span class="td-val ${Number(trade.pnl)>=0?"pnl-positive":"pnl-negative"}">${formatPnL(trade.pnl)}</span>
          </div>
          <div style="margin-top:10px;">
            <div class="td-section-label" style="margin-bottom:5px;">Notes</div>
            <textarea class="trade-notes dark-textarea" rows="4" placeholder="Add trade notes...">${trade.notes??""}</textarea>
          </div>
          <div style="margin-top:10px;">
            <div class="td-section-label" style="margin-bottom:5px;">Emotions</div>
            <select class="emotion-add dark-select">
              <option value="">+ Add emotion</option>
              ${EMOTIONS.map(e=>`<option value="${e.id}">${e.emotion}</option>`).join("")}
            </select>
            <div class="emotion-tag-container">${renderEmotionTags(trade)}</div>
          </div>
        </div>

        <!-- COL 2: Strategy, setups, quick stats -->
        <div class="td-col">
          <div class="td-section-label">Strategy</div>
          <select class="trade-strategy dark-select">${strategyOptions}</select>
          <div class="strategy-tag-container">${renderStrategyTag(trade.key_strategies_id)}</div>

          <div class="td-section-label" style="margin-top:10px;">Setups</div>
          <select class="setup-add dark-select">
            <option value="">+ Add setup</option>
            ${SETUPS.map(s=>`<option value="${s.id}">${s.setup_name}</option>`).join("")}
          </select>
          <div class="setup-tag-container">${renderSetupTags(trade)}</div>
        </div>

        <!-- COL 3: Chart -->
        <div class="td-col td-col-chart">
          <div class="td-section-label">Chart <span style="font-size:9px;color:var(--text-faint);font-weight:400;letter-spacing:0;text-transform:none;margin-left:4px;">click to expand</span></div>
          <div id="tradeChart-${trade.id}" class="chart-clickable" style="height:340px;" onclick="openChartOverlay('${trade.id}', '${trade.symbol}', ${trade.entryPrice}, ${trade.exitPrice})"></div>
        </div>

      </div>
    </div>`;

  detailsTr.appendChild(td);
  tr.after(detailsTr);
  const panel=td.querySelector(".trade-details");
  panel.offsetHeight;
  requestAnimationFrame(()=>panel.classList.add("open"));
  openRow={tr,detailsTr,panel};

  showTradeChart(trade, `tradeChart-${trade.id}`);

  /* notes autosave */
  const notesEl=td.querySelector(".trade-notes");
  let notesTimer=null;
  notesEl.addEventListener("input", () => {
    clearTimeout(notesTimer);
    notesTimer=setTimeout(() => {
      fetch(`/api/trades/${trade.id}`, { method:"PATCH", headers:{"Content-Type":"application/json"}, body:JSON.stringify({notes:notesEl.value}) });
      trade.notes=notesEl.value;
    }, 600);
  });

  /* strategy change */
  const strategySelect=td.querySelector(".trade-strategy");
  const strategyContainer=td.querySelector(".strategy-tag-container");
  strategySelect.addEventListener("change", () => {
    const val=strategySelect.value||null;
    fetch(`/api/trades/${trade.id}`, { method:"PATCH", headers:{"Content-Type":"application/json"}, body:JSON.stringify({key_strategies_id:val}) });
    trade.key_strategies_id=val?Number(val):null;
    strategyContainer.innerHTML=renderStrategyTag(trade.key_strategies_id);
    attachStrategyRemoveHandler(trade, strategyContainer);
  });
  attachStrategyRemoveHandler(trade, strategyContainer);

  /* setup add */
  const setupSelect=td.querySelector(".setup-add");
  const setupContainer = td.querySelectorAll(".td-col")[1].querySelector(".setup-tag-container");
  setupSelect.addEventListener("change", async () => {
    const setupId=setupSelect.value; if(!setupId) return;
    await fetch("/api/trade_setup", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({key_trade_id:trade.id, key_setup_id:setupId}) });
    trade.setups.push(Number(setupId));
    setupContainer.innerHTML=renderSetupTags(trade);
    setupSelect.value="";
  });

  attachSetupRemoveHandlers(trade, setupContainer);

  /* emotion add */
  const emotionSelect=td.querySelector(".emotion-add");
  const emotionContainer=td.querySelector(".emotion-tag-container");
  emotionSelect.addEventListener("change", async () => {
    const emotionId=emotionSelect.value; if(!emotionId) return;
    await fetch("/api/emotions_trades", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({trade_id:trade.id, emotions_id:Number(emotionId)}) });
    trade.emotions.push(Number(emotionId));
    emotionContainer.innerHTML=renderEmotionTags(trade);
    emotionSelect.value="";
  });
}

const accountSelect=document.getElementById("accountSelect");
if (accountSelect) accountSelect.addEventListener("change", ()=>applyFiltersAndRender());

function updatePnLChart(data) {
  const ctx=document.getElementById("pnlChart"); if(!ctx) return;
  if (charts.pnl) charts.pnl.destroy();
  const daily={};
  data.forEach(t=>{ const d=t.entryTimestamp.toISOString().slice(0,10); daily[d]=(daily[d]||0)+(Number(t.pnl)||0); });
  const dates=Object.keys(daily).sort();
  let cum=0;
  const values=dates.map(d=>(cum+=daily[d], +cum.toFixed(2)));
  charts.pnl=new Chart(ctx, {
    type:"line",
    data:{ labels:dates, datasets:[{ data:values, borderColor:"#34c38f", borderWidth:2,
      fill:true, tension:0.3, pointRadius:0,
      backgroundColor:ctx2=>{ const {chartArea}=ctx2.chart; if(!chartArea) return "transparent"; const g=ctx2.chart.ctx.createLinearGradient(0,chartArea.top,0,chartArea.bottom); g.addColorStop(0,"rgba(52,195,143,0.18)"); g.addColorStop(1,"rgba(52,195,143,0)"); return g; }
    }]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{ x:{display:false}, y:{ ticks:{color:"#5a6070", font:{size:10,family:"'IBM Plex Mono'"}, callback:v=>`$${v}`}, grid:{color:"rgba(255,255,255,0.04)"} } }
    }
  });
}

function attachStrategyRemoveHandler(trade, container) {
  const tag=container.querySelector("[data-remove-strategy]");
  if (tag) tag.addEventListener("click", ()=>{
    fetch(`/api/trades/${trade.id}`, { method:"PATCH", headers:{"Content-Type":"application/json"}, body:JSON.stringify({key_strategies_id:null}) });
    trade.key_strategies_id=null;
    container.innerHTML=renderStrategyTag(null);
    attachStrategyRemoveHandler(trade, container);
  });
}

function attachSetupRemoveHandlers(trade, container) {
  container.querySelectorAll(".setup-tag").forEach(tag=>{
    tag.addEventListener("click", async ()=>{
      const id=tag.dataset.tradeSetupId;
      await fetch(`/api/trade_setup/${id}`, {method:"DELETE"});
      trade.setups=trade.setups.filter(s=>s.trade_setup_id!=id);
      container.innerHTML=renderSetupTags(trade);
      attachSetupRemoveHandlers(trade, container);
    });
  });
}

function closeDetails() {
  if (!openRow) return;
  const {tr,detailsTr,panel}=openRow;
  tr.classList.remove("expanded");
  panel.classList.remove("open");
  setTimeout(()=>detailsTr.remove(), 250);
  openRow=null;
}

async function applyFiltersAndRender() {
  if (!dataReady) return;
  const from=document.getElementById("dateFrom")?.value||null;
  const to=document.getElementById("dateTo")?.value||null;
  let data=normalizeTrades(await fetchFilteredTrades({account:accountSelect?.value, from, to}));

  document.querySelectorAll("th input[data-col]").forEach(input=>{
    if (!input.value) return;
    const val=input.value.toLowerCase();
    data=data.filter(r=>String(r[input.dataset.col]??"").toLowerCase().includes(val));
  });

  const selectedSetups=[...document.querySelectorAll("#setupFilter button.active")].map(b=>Number(b.dataset.id));
  if (selectedSetups.length) data=data.filter(t=>selectedSetups.some(id=>t.setups?.includes(id)));

  const activeStrategy=document.querySelector("#strategyFilter button.active");
  if (activeStrategy) data=data.filter(t=>t.key_strategies_id===Number(activeStrategy.dataset.id));

  data.sort((a,b)=>a.entryTimestamp-b.entryTimestamp);
  buildRows(data);
  updatePnLChart(data);
  renderJournalStats(data);
}

function applyDateFromURL() {
  const params=new URLSearchParams(window.location.search);
  const from=params.get("from"); const to=params.get("to");
  if (from) document.getElementById("dateFrom").value=from;
  if (to)   document.getElementById("dateTo").value=to;
}
function openChartOverlay(tradeId, symbol, entryPrice, exitPrice) {
  const source = document.getElementById(`tradeChart-${tradeId}`);
  if (!source) return;

  const overlay = document.createElement("div");
  overlay.className = "chart-overlay";
  overlay.id = "chartOverlay";

  overlay.innerHTML = `
    <div class="chart-overlay-inner">
      <div class="chart-overlay-header">
        <span class="chart-overlay-title">${symbol} — Entry ${entryPrice} · Exit ${exitPrice}</span>
        <button class="chart-overlay-close" onclick="closeChartOverlay()">✕</button>
      </div>
      <div class="chart-overlay-body">
        <div id="chartOverlayContent" style="height:100%;min-height:500px;"></div>
      </div>
    </div>`;

  document.body.appendChild(overlay);
  overlay.addEventListener("click", e => { if (e.target === overlay) closeChartOverlay(); });
  document.addEventListener("keydown", overlayKeyHandler);

  const trade = originalData.find(t => t.id == tradeId);
  if (trade) showTradeChart(trade, "chartOverlayContent");
}

function closeChartOverlay() {
  const overlay = document.getElementById("chartOverlay");
  if (overlay) overlay.remove();
  document.removeEventListener("keydown", overlayKeyHandler);
}

function overlayKeyHandler(e) {
  if (e.key === "Escape") closeChartOverlay();
}


async function showTradeChart(trade, containerId) {
  const chartEl=document.getElementById(containerId);
  chartEl.innerHTML="";
  if (trade.chart_image) {
    chartEl.innerHTML=`<img src="data:image/png;base64,${trade.chart_image}" style="width:100%;height:340px;object-fit:contain;border-radius:6px;"/>`;
    return;
  }
  if (typeof LightweightCharts!=="undefined") { return; }
  chartEl.innerHTML=`<div style="height:340px;display:flex;align-items:center;justify-content:center;background:var(--bg-elevated);border-radius:6px;color:var(--text-faint);font-size:12px;">No chart available</div>`;
}
</script>

{% endblock %}
