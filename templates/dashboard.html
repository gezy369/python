{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<h2>Monthly Trading Calendar</h2>

<div class="calendar-controls-modern">
  <button id="prevMonth" class="cal-nav">◀</button>

  <div class="calendar-current">
    <span id="calendarLabel"></span>
  </div>

  <button id="nextMonth" class="cal-nav">▶</button>
</div>

<div class="calendar-wrapper">
  <div id="tradingCalendar" class="calendar-grid"></div>
  <!-- 👇 Monthly total goes HERE -->
  <div id="calendarMonthTotal" class="calendar-month-total"></div>
</div>

<div class="dashboard-stats">
  <div id="monthlyStats" class="dashboard-card">
    <canvas id="monthlyEquityChart" height="120"></canvas>
    <div class="stats-content"></div>
  </div>

  <div id="accountStats" class="dashboard-card">
    <canvas id="accountEquityChart" height="120"></canvas>
    <div class="stats-content"></div>
  </div>
</div>

<script>

//Render calendar on account change
const accountSelect = document.getElementById("accountSelect");
if (accountSelect) {
  accountSelect.addEventListener("change", () => {
    renderCalendar();
  });
}

const calendarEl = document.getElementById("tradingCalendar");

const MONTHS = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
];

// default to current month/year
const now = new Date();

/* =================== Fetch trades =================== */
let trades = [];

fetch("/api/trades")
  .then(r => r.json())
  .then(data => {
    trades = data.map(t => ({
      ...t,
      entryDate: new Date(t.entryTimestamp)
    }));
    renderCalendar();
  });

let currentDate = new Date();
const calendarLabel = document.getElementById("calendarLabel");

function updateCalendarLabel() {
  const month = currentDate.getMonth();
  const year = currentDate.getFullYear();
  calendarLabel.textContent = `${MONTHS[month]} ${year}`;
}

document.getElementById("prevMonth").onclick = () => {
  currentDate.setMonth(currentDate.getMonth() - 1);
  updateCalendarLabel();
  renderCalendar();
};

document.getElementById("nextMonth").onclick = () => {
  currentDate.setMonth(currentDate.getMonth() + 1);
  updateCalendarLabel();
  renderCalendar();
};

updateCalendarLabel();
renderCalendar();

/* =================== Calendar rendering =================== */
async function renderCalendar() {
  calendarEl.innerHTML = "";

  const month = currentDate.getMonth();
  const year = currentDate.getFullYear();

  // ✅ valid month range
  const fromDate = new Date(year, month, 1);
  const toDate   = new Date(year, month + 1, 0);

  const from = fromDate.toISOString().slice(0, 10);
  const to   = toDate.toISOString().slice(0, 10);

  // 1️⃣ Month filtered trades
  let monthlyTrades = await fetchFilteredTrades({
    account: accountSelect?.value,
    from,
    to
  });

  // 2️⃣ Full account trades (no date filter)
  let accountTrades = await fetchFilteredTrades({
    account: accountSelect?.value
  });

  // 🔒 guard
  if (!Array.isArray(filteredTrades)) {
    console.error("Dashboard API error:", filteredTrades);
    filteredTrades = [];
  }

  // normalize timestamps
  filteredTrades = filteredTrades.map(t => ({
    ...t,
    entryDate: new Date(t.entryTimestamp)
  }));

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startWeekday = (firstDay.getDay() + 6) % 7;
  const daysInMonth = lastDay.getDate();

  ["Mon","Tue","Wed","Thu","Fri"].forEach(d => {
    const h = document.createElement("div");
    h.className = "calendar-header";
    h.textContent = d;
    calendarEl.appendChild(h);
  });

  const monthlyTotal = { trades: 0, pnl: 0 };

  filteredTrades.forEach(t => {
    const d = t.entryDate;
    if (d.getMonth() === month && d.getFullYear() === year) {
      monthlyTotal.trades++;
      monthlyTotal.pnl += Number(t.pnl) || 0;
    }
  });

  renderDashboardStats(monthlyTrades, accountTrades, month, year);

  const emptyCells = Math.min(startWeekday, 5);
  for (let i = 0; i < emptyCells; i++) {
    calendarEl.appendChild(document.createElement("div"));
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const dateObj = new Date(year, month, day);
    const weekday = dateObj.getDay();
    if (weekday === 0 || weekday === 6) continue;

    const isoDate = `${year}-${String(month + 1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;

    const dayTrades = filteredTrades.filter(t =>
      t.entryDate.getFullYear() === year &&
      t.entryDate.getMonth() === month &&
      t.entryDate.getDate() === day
    );

    const tradeCount = dayTrades.length;
    const dayPnL = dayTrades.reduce((s, t) => s + (Number(t.pnl) || 0), 0);

    let pnlClass = "day-flat";
    if (tradeCount > 0) {
      pnlClass = dayPnL > 0 ? "day-positive" : dayPnL < 0 ? "day-negative" : "day-flat";
    }

    const cell = document.createElement("div");
    cell.className = `calendar-day ${pnlClass}`;
    cell.dataset.date = isoDate;
    cell.innerHTML = `
      <div class="calendar-date">${day}</div>
      <div class="calendar-trades">${tradeCount} trade${tradeCount !== 1 ? "s" : ""}</div>
      <div class="calendar-pnl ${dayPnL > 0 ? "positive" : dayPnL < 0 ? "negative" : ""}">
        ${tradeCount ? `${dayPnL > 0 ? "+" : ""}$${dayPnL.toFixed(2)}` : ""}
      </div>
    `;

    calendarEl.appendChild(cell);
  }

  document.getElementById("calendarMonthTotal").innerHTML = `
    <strong>Month total</strong>
    <span class="month-trades">${monthlyTotal.trades} trades</span>
    <span class="month-pnl ${monthlyTotal.pnl >= 0 ? "positive" : "negative"}">
      ${monthlyTotal.pnl >= 0 ? "+" : ""}$${monthlyTotal.pnl.toFixed(2)}
    </span>
  `;
}

/* ===================== STATS ========================= */
let monthlyChartInstance = null;
let accountChartInstance = null;

function renderDashboardStats(monthlyTrades, accountTrades, month, year) {

  /* =========================
     📈 EQUITY DATA BUILDER
  ========================== */

  function buildEquityData(trades) {
    const sorted = [...trades].sort(
      (a, b) => new Date(a.entryDate) - new Date(b.entryDate)
    );

    let cumulative = 0;
    const labels = [];
    const data = [];

    sorted.forEach(t => {
      cumulative += Number(t.pnl) || 0;
      labels.push(new Date(t.entryDate).toISOString().slice(0, 10));
      data.push(cumulative);
    });

    return { labels, data };
  }

  /* =========================
     📅 MONTHLY EQUITY
  ========================== */

  const monthlyEquity = buildEquityData(monthlyTrades);

  if (monthlyChartInstance) monthlyChartInstance.destroy();

  monthlyChartInstance = new Chart(
    document.getElementById("monthlyEquityChart"),
    {
      type: "line",
      data: {
        labels: monthlyEquity.labels,
        datasets: [{
          label: "Monthly Equity",
          data: monthlyEquity.data,
          tension: 0.3,
          fill: false
        }]
      },
      options: {
        plugins: { legend: { display: false } },
        scales: {
          x: { display: false }
        }
      }
    }
  );

  /* =========================
     🏦 FULL ACCOUNT EQUITY
  ========================== */

  const accountEquity = buildEquityData(accountTrades);

  if (accountChartInstance) accountChartInstance.destroy();

  accountChartInstance = new Chart(
    document.getElementById("accountEquityChart"),
    {
      type: "line",
      data: {
        labels: accountEquity.labels,
        datasets: [{
          label: "Account Equity",
          data: accountEquity.data,
          tension: 0.3,
          fill: false
        }]
      },
      options: {
        plugins: { legend: { display: false } },
        scales: {
          x: { display: false }
        }
      }
    }
  );

  /* =========================
     📊 MONTHLY STATS
  ========================== */

  const monthlyPnL = monthlyTrades.reduce((s,t)=>s+(Number(t.pnl)||0),0);
  const monthlyWins = monthlyTrades.filter(t=>Number(t.pnl)>0).length;
  const monthlyWinRate = monthlyTrades.length
    ? ((monthlyWins / monthlyTrades.length) * 100).toFixed(1)
    : 0;

  document.querySelector("#monthlyStats .stats-content").innerHTML = `
    <h4>${MONTHS[month]} ${year}</h4>
    <div>Trades: <strong>${monthlyTrades.length}</strong></div>
    <div>
      PnL:
      <span class="${monthlyPnL>=0?"positive":"negative"}">
        ${monthlyPnL>=0?"+":""}$${monthlyPnL.toFixed(2)}
      </span>
    </div>
    <div>Win Rate: ${monthlyWinRate}%</div>
  `;

  /* =========================
     🏦 ACCOUNT STATS
  ========================== */

  const totalPnL = accountTrades.reduce((s,t)=>s+(Number(t.pnl)||0),0);
  const totalWins = accountTrades.filter(t=>Number(t.pnl)>0).length;
  const totalWinRate = accountTrades.length
    ? ((totalWins / accountTrades.length) * 100).toFixed(1)
    : 0;

  document.querySelector("#accountStats .stats-content").innerHTML = `
    <h4>Full Account</h4>
    <div>Trades: <strong>${accountTrades.length}</strong></div>
    <div>
      PnL:
      <span class="${totalPnL>=0?"positive":"negative"}">
        ${totalPnL>=0?"+":""}$${totalPnL.toFixed(2)}
      </span>
    </div>
    <div>Win Rate: ${totalWinRate}%</div>
  `;
}


/* =================== Click → journal filtered day =================== */
document.addEventListener("click", e => {
  const day = e.target.closest(".calendar-day");
  if (!day) return;

  const date = day.dataset.date;
  if (!date) return;

  window.location.href = `/journal?from=${date}&to=${date}`;
});
</script>

{% endblock %}
